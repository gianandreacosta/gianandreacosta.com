<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Proposta</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>Lunch Break Walker</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a><a class='btn ghost' href='map.html'>Mappa</a></div></div><div class='card'><h2>Proposta pausa pranzo</h2><div id='main'></div><h3>Alternative</h3><div id='alts' class='list'></div></div></div><script src='assets/js/app.js'></script><script>const p=LBW.getProposal();main.innerHTML=`<p><b>Camminata:</b> ${p.walk.minutes} min (${p.walk.distanceKm} km), ${p.walk.type}</p><p><b>Destinazione:</b> ${p.food.name} • ${p.food.cuisine} • ${p.food.price} • ⭐ ${p.food.rating}</p><p><b>Tempo stimato per pranzo:</b> ${p.food.etaEatMin} min</p>`;alts.innerHTML=p.alternatives.map(a=>`<div class='card'><b>${a.name}</b><div class='small'>${a.cuisine} • ${a.price} • ⭐ ${a.rating} • ${a.distance.toFixed(2)} km</div><a class='btn ghost' style='margin-top:8px;display:inline-block' href='place.html?id=${a.id}'>Apri scheda</a></div>`).join('');</script></body></html>
