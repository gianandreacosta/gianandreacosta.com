<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cronologia / Salvati</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>Lunch Break Walker</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div><div class='grid cols-2'><div class='card'><h3>Salvati</h3><div id='saved' class='list'></div></div><div class='card'><h3>Cronologia</h3><div id='hist' class='list'></div></div></div></div><script src='assets/js/app.js'></script><script>const s=LBW.Store.get('lbw_saved',[]),h=LBW.Store.get('lbw_history',[]);saved.innerHTML=s.length?s.map(x=>`<div class='card'><b>${x.proposal.food.name}</b><div class='small'>${new Date(x.when).toLocaleString()}</div></div>`).join(''):'<div class="small">Nessun salvataggio</div>';hist.innerHTML=h.length?h.map(x=>`<div class='card'><b>${x.food.name}</b><div class='small'>${new Date(x.createdAt).toLocaleString()}</div></div>`).join(''):'<div class="small">Nessuna pausa registrata</div>';</script></body></html>
