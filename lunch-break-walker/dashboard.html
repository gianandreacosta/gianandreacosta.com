<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Dashboard</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>Lunch Break Walker</div><div class='nav-links'><a class='btn ghost' href='preferences.html'>Preferenze</a><a class='btn ghost' href='history.html'>Cronologia</a></div></div><h2 id='hello'></h2><p class='small'>Proposta pausa pranzo di oggi</p><div class='grid cols-2'><div class='card'><span class='badge'>Camminata</span><h3 id='walk'></h3><p id='walk2' class='small'></p></div><div class='card'><span class='badge'>Food</span><h3 id='food'></h3><p id='food2' class='small'></p></div></div><div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'><a class='btn' href='map.html'>Segui il percorso</a><button id='refresh' class='btn secondary'>Cambia proposta</button><button id='save' class='btn ghost'>Salva</button><a class='btn ghost' href='proposal.html'>Dettaglio proposta</a></div></div><script src='assets/js/app.js'></script><script>const u=LBW.getUser();if(!u)location.href='login.html';hello.textContent=`Ciao ${u.name}, ecco la tua pausa ideale`;function render(){const p=LBW.getProposal();walk.textContent=`${p.walk.minutes} min • ${p.walk.distanceKm} km`;walk2.textContent=p.walk.type;food.textContent=`${p.food.name} (${p.food.cuisine})`;food2.textContent=`${p.food.price} • ⭐ ${p.food.rating} • a ${p.food.distance.toFixed(2)} km`;}render();refresh.onclick=()=>{LBW.buildProposal();render();};save.onclick=()=>{LBW.saveCurrent();alert('Proposta salvata');};</script></body></html>
