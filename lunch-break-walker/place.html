<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ristorante</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'>Lunch Break Walker</div><div class='nav-links'><a class='btn secondary' href='proposal.html'>Proposta</a></div></div><div class='card' id='box'></div></div><script src='assets/js/app.js'></script><script>const id=+new URLSearchParams(location.search).get('id');const all=[LBW.getProposal().food,...LBW.getProposal().alternatives];const r=all.find(x=>x.id===id)||LBW.getProposal().food;box.innerHTML=`<h2>${r.name}</h2><p>${r.cuisine} • ${r.price} • ⭐ ${r.rating}</p><p class='small'>Distanza: ${r.distance?.toFixed(2) ?? '-'} km</p><button class='btn' onclick='LBW.saveCurrent();alert("Salvato")'>Salva nei preferiti</button>`;</script></body></html>
