<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mappa percorso</title><link rel='stylesheet' href='assets/css/styles.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script></head><body><div class='container'><div class='nav'><div class='brand'>Lunch Break Walker</div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>Dashboard</a></div></div><div class='card'><h2>Percorso consigliato</h2><div id='map' class='map-box'></div><p class='small' id='meta'></p></div></div><script src='assets/js/app.js'></script><script>const p=LBW.getProposal();meta.textContent=`${p.walk.minutes} min • ${p.walk.distanceKm} km • destinazione ${p.food.name}`;const map=L.map('map');L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);const pts=p.route.map(x=>[x.lat,x.lng]);L.polyline(pts,{color:'#22c55e',weight:4}).addTo(map);L.marker(pts[0]).addTo(map).bindPopup('Partenza ufficio');L.marker(pts[2]).addTo(map).bindPopup(p.food.name);map.fitBounds(L.latLngBounds(pts),{padding:[20,20]});</script></body></html>
