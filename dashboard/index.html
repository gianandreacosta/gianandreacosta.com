<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📊 Dashboard Rassegna Stampa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e4e4e7;
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }
    .container { max-width: 720px; margin: 0 auto; }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2rem;
      padding-top: 0.5rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .header .subtitle {
      color: #71717a;
      font-size: 0.85rem;
      margin-top: 0.3rem;
    }
    .header .back-link {
      display: inline-block;
      margin-bottom: 0.75rem;
      color: #71717a;
      text-decoration: none;
      font-size: 0.8rem;
    }
    .header .back-link:hover { color: #a1a1aa; }

    .meta-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }
    .meta-bar .timestamp {
      color: #52525b;
      font-size: 0.75rem;
    }
    .btn-refresh {
      background: #27272a;
      border: 1px solid #3f3f46;
      color: #a1a1aa;
      padding: 0.35rem 0.9rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-refresh:hover { background: #3f3f46; color: #e4e4e7; }
    .btn-refresh:active { transform: scale(0.95); }

    /* Cards */
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #52525b;
      margin-bottom: 0.75rem;
    }

    /* Big number */
    .big-number {
      font-size: 2.5rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
    }
    .big-label {
      color: #71717a;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    /* Run info */
    .run-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      text-align: center;
    }
    .run-stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }
    .run-stat-label {
      font-size: 0.7rem;
      color: #71717a;
      margin-top: 0.15rem;
    }
    .run-time {
      color: #52525b;
      font-size: 0.75rem;
      margin-top: 0.75rem;
      text-align: center;
    }

    /* Category bars */
    .cat-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .cat-name {
      font-size: 0.8rem;
      color: #a1a1aa;
      width: 120px;
      flex-shrink: 0;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .cat-bar-wrap {
      flex: 1;
      background: #27272a;
      border-radius: 6px;
      height: 22px;
      overflow: hidden;
      position: relative;
    }
    .cat-bar {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
      min-width: 2px;
    }
    .cat-bar-count {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.7);
    }
    .cat-badge {
      font-size: 0.65rem;
      color: #52525b;
      margin-left: 0.25rem;
    }

    /* Category colors */
    .color-geopolitica { background: linear-gradient(90deg, #dc2626, #ef4444); }
    .color-cronaca_ticino { background: linear-gradient(90deg, #0891b2, #22d3ee); }
    .color-economia { background: linear-gradient(90deg, #16a34a, #4ade80); }
    .color-cultura { background: linear-gradient(90deg, #9333ea, #c084fc); }
    .color-cronaca_svizzera { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .color-ai_openclaw { background: linear-gradient(90deg, #2563eb, #60a5fa); }
    .color-default { background: linear-gradient(90deg, #52525b, #71717a); }

    /* Source table */
    .source-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .source-table th {
      text-align: left;
      color: #52525b;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.5rem 0.4rem;
      border-bottom: 1px solid #27272a;
      font-weight: 600;
    }
    .source-table th:nth-child(3),
    .source-table th:nth-child(4) { text-align: right; }
    .source-table td {
      padding: 0.45rem 0.4rem;
      border-bottom: 1px solid #1e1e21;
      color: #a1a1aa;
    }
    .source-table td:nth-child(3),
    .source-table td:nth-child(4) {
      text-align: right;
      font-variant-numeric: tabular-nums;
      color: #e4e4e7;
    }
    .source-table tr:hover td { background: #1c1c1f; }
    .cat-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
    .new-badge {
      background: #16a34a;
      color: #fff;
      font-size: 0.6rem;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-weight: 700;
    }

    /* Loading / Error */
    .loading { text-align: center; color: #52525b; padding: 3rem 0; }
    .error { text-align: center; color: #dc2626; padding: 2rem 0; }

    /* Responsive */
    @media (max-width: 500px) {
      .cat-name { width: 85px; font-size: 0.7rem; }
      .run-grid { grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
      .big-number { font-size: 2rem; }
      .source-table { font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="analisi.html" class="back-link">← Analisi AI</a>
      <h1>📊 Dashboard Rassegna Stampa</h1>
      <p class="subtitle">Monitoraggio automatico fonti giornalistiche &nbsp;·&nbsp; <a href="/" style="color:#52525b;text-decoration:none;font-size:0.8rem;">🏠 Home</a></p>
      <div class="meta-bar">
        <span class="timestamp" id="generated-at">Caricamento...</span>
        <button class="btn-refresh" id="btn-refresh" onclick="loadData()">🔄 Aggiorna</button>
      </div>
    </div>

    <div id="content">
      <div class="loading">Caricamento dati...</div>
    </div>
  </div>

  <script>
    const CAT_COLORS = {
      geopolitica: '#dc2626',
      cronaca_ticino: '#0891b2',
      economia: '#16a34a',
      cultura: '#9333ea',
      cronaca_svizzera: '#d97706',
      ai_openclaw: '#2563eb',
    };

    const CAT_LABELS = {
      geopolitica: '🌍 Geopolitica',
      cronaca_ticino: '🏔️ Cronaca Ticino',
      economia: '💰 Economia',
      cultura: '🎭 Cultura',
      cronaca_svizzera: '🇨🇭 Cronaca Svizzera',
      ai_openclaw: '🤖 AI & Tech',
    };

    function catColor(cat) { return CAT_COLORS[cat] || '#52525b'; }
    function catLabel(cat) { return CAT_LABELS[cat] || cat; }
    function catClass(cat) { return CAT_COLORS[cat] ? 'color-' + cat : 'color-default'; }

    function formatTime(ts) {
      if (!ts) return '—';
      try {
        const d = new Date(ts.replace(' ', 'T').replace(/\+00:00$/, 'Z'));
        return d.toLocaleString('it-CH', { timeZone: 'Europe/Zurich', dateStyle: 'medium', timeStyle: 'short' });
      } catch { return ts; }
    }

    async function loadData() {
      const btn = document.getElementById('btn-refresh');
      btn.textContent = '⏳ Carico...';
      btn.disabled = true;

      try {
        const resp = await fetch('/rassegna-stats.json?t=' + Date.now());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        render(data);
        document.getElementById('generated-at').textContent = '⏱️ Aggiornato: ' + data.generated_at;
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="error">❌ Errore caricamento dati<br><small>' + e.message + '</small></div>';
      } finally {
        btn.textContent = '🔄 Aggiorna';
        btn.disabled = false;
      }
    }

    function render(data) {
      const maxCat = Math.max(...data.by_category.map(c => c.count));

      // Build last-run category map
      const lastRunCatMap = {};
      (data.last_run_by_category || []).forEach(c => { lastRunCatMap[c.category] = c.count; });

      let html = '';

      // CARD 1: Overview + Last Run
      html += `
        <div class="card">
          <div class="card-title">Panoramica</div>
          <div style="display:flex;align-items:baseline;gap:1rem;margin-bottom:1rem;">
            <span class="big-number">${data.total_articles.toLocaleString('it')}</span>
            <span class="big-label">articoli monitorati</span>
          </div>
          ${data.last_run ? `
          <div class="run-grid">
            <div>
              <div class="run-stat-value">${data.last_run.articles_found.toLocaleString('it')}</div>
              <div class="run-stat-label">Scansionati</div>
            </div>
            <div>
              <div class="run-stat-value" style="color:#4ade80">${data.last_run.articles_new.toLocaleString('it')}</div>
              <div class="run-stat-label">Nuovi</div>
            </div>
            <div>
              <div class="run-stat-value" style="color:#fbbf24">${data.last_run.articles_updated.toLocaleString('it')}</div>
              <div class="run-stat-label">Aggiornati</div>
            </div>
          </div>
          <div class="run-time">Ultima run: ${formatTime(data.last_run.run_time)}</div>
          ` : ''}
        </div>`;

      // CARD 2: Categories
      html += `<div class="card"><div class="card-title">Articoli per Categoria</div>`;
      data.by_category.forEach(c => {
        const pct = (c.count / maxCat * 100).toFixed(1);
        const newCount = lastRunCatMap[c.category] || 0;
        html += `
          <div class="cat-row">
            <span class="cat-name">${catLabel(c.category)}</span>
            <div class="cat-bar-wrap">
              <div class="cat-bar ${catClass(c.category)}" style="width:${pct}%"></div>
              <span class="cat-bar-count">${c.count}${newCount ? ' <span class="new-badge">+' + newCount + '</span>' : ''}</span>
            </div>
          </div>`;
      });
      html += `</div>`;

      // CARD 3: Sources
      html += `<div class="card"><div class="card-title">Fonti (${data.by_source.length})</div>`;
      html += `<div style="overflow-x:auto;"><table class="source-table">
        <thead><tr><th>Fonte</th><th>Categoria</th><th>Totale</th><th>Ultima run</th></tr></thead><tbody>`;
      data.by_source.forEach(s => {
        html += `<tr>
          <td>${s.source}</td>
          <td><span class="cat-dot" style="background:${catColor(s.category)}"></span>${catLabel(s.category)}</td>
          <td>${s.total_articles}</td>
          <td>${s.last_run_articles > 0 ? '<span class="new-badge">+' + s.last_run_articles + '</span>' : '—'}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;

      // CARD 4: Run History
      if (data.runs_history && data.runs_history.length > 1) {
        html += `<div class="card"><div class="card-title">Storico Run (ultime ${data.runs_history.length})</div>`;
        html += `<div style="overflow-x:auto;"><table class="source-table">
          <thead><tr><th>Data/Ora</th><th style="text-align:right">Scansionati</th><th style="text-align:right">Nuovi</th><th style="text-align:right">Aggiornati</th></tr></thead><tbody>`;
        data.runs_history.forEach(r => {
          html += `<tr>
            <td>${formatTime(r.run_time)}</td>
            <td style="text-align:right">${r.articles_found.toLocaleString('it')}</td>
            <td style="text-align:right;color:#4ade80">${r.articles_new > 0 ? '+' + r.articles_new : '0'}</td>
            <td style="text-align:right;color:#fbbf24">${r.articles_updated.toLocaleString('it')}</td>
          </tr>`;
        });
        html += `</tbody></table></div></div>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    loadData();
  </script>
</body>
</html>
