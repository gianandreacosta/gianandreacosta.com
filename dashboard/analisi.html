<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#x1f9e0; Analisi AI Rassegna</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a; color: #e4e4e7;
      min-height: 100vh; padding: 1.5rem 1rem 3rem;
    }
    .container { max-width: 720px; margin: 0 auto; }

    /* Nav */
    .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.82rem; font-weight: 600;
      text-decoration: none; color: #a1a1aa; background: #18181b; border: 1px solid #27272a; transition: all 0.15s;
    }
    .nav-btn:hover { background: #27272a; color: #e4e4e7; }
    .nav-btn-accent { background: #1e1b4b; border-color: #312e81; color: #a5b4fc; }
    .nav-btn-accent:hover { background: #312e81; color: #c7d2fe; }
    .nav-btn-admin { background: #451a03; border-color: #b45309; color: #fbbf24; }
    .nav-btn-admin:hover { background: #78350f; color: #fcd34d; }
    .nav-left { display: flex; gap: 0.5rem; }

    /* Header */
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; color: #fff; }
    .header .subtitle { color: #71717a; font-size: 0.85rem; margin-top: 0.3rem; }

    /* Cards */
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
    .card-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #52525b; margin-bottom: 0.75rem; }

    /* Card meta row */
    .card-meta { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #27272a; }
    .card-meta-left { display: flex; flex-direction: column; gap: 0.2rem; }
    .card-date { font-size: 1rem; font-weight: 600; color: #e4e4e7; }
    .card-model { font-size: 0.8rem; font-weight: 500; color: #818cf8; }
    .btn-refresh {
      background: #27272a; border: 1px solid #3f3f46; color: #a1a1aa;
      padding: 0.35rem 0.9rem; border-radius: 8px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s;
    }
    .btn-refresh:hover { background: #3f3f46; color: #e4e4e7; }

    /* Status grid */
    .status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; text-align: center; }
    .stat-box { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #fff; line-height: 1; }
    .stat-label { font-size: 0.7rem; color: #71717a; margin-top: 0.15rem; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600;
    }
    .badge-ok { background: #14532d; color: #4ade80; }
    .badge-error { background: #450a0a; color: #f87171; }
    .badge-partial { background: #431407; color: #fb923c; }

    /* Category sections */
    .cat-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem; }
    .cat-label { font-size: 1rem; font-weight: 700; color: #fff; }
    .cat-sommario { font-size: 0.82rem; color: #71717a; margin-bottom: 1rem; line-height: 1.5; }

    /* News items */
    .news-item { border-top: 1px solid #27272a; padding: 0.85rem 0; }
    .news-item:first-of-type { border-top: none; }
    .news-title-row { display: flex; align-items: flex-start; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.4rem; }
    .news-title { font-size: 0.9rem; font-weight: 600; color: #e4e4e7; text-decoration: none; line-height: 1.4; }
    .news-title:hover { color: #fff; text-decoration: underline; }
    .badge { display: inline-flex; align-items: center; padding: 0.1rem 0.45rem; border-radius: 10px; font-size: 0.62rem; font-weight: 600; white-space: nowrap; }
    .badge-fonte { background: #1e1e3f; color: #818cf8; }
    .badge-incrocio { background: #431407; color: #f59e0b; }
    .badge-alta { background: #0c1a0e; color: #4ade80; }
    .badge-media { background: #1c1300; color: #fbbf24; }
    .news-riassunto { font-size: 0.8rem; color: #71717a; line-height: 1.55; margin-bottom: 0.35rem; }

    /* Differenze narrative */
    .diff-toggle { font-size: 0.72rem; color: #f59e0b; cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 0.4rem; display: inline-flex; align-items: center; gap: 0.3rem; }
    .diff-toggle:hover { color: #fbbf24; }
    .diff-content { font-size: 0.78rem; color: #a1a1aa; background: #111113; border-left: 2px solid #f59e0b; padding: 0.5rem 0.75rem; border-radius: 0 6px 6px 0; margin-bottom: 0.35rem; display: none; line-height: 1.5; }
    .diff-content.open { display: block; }

    /* Trend pills */
    .trend-section { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid #27272a; }
    .trend-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #52525b; margin-bottom: 0.4rem; }
    .trend-pills { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .trend-pill { background: #1e1e21; border: 1px solid #3f3f46; border-radius: 20px; padding: 0.2rem 0.65rem; font-size: 0.72rem; color: #a1a1aa; }

    /* Watch box */
    .watch-box { background: #1a1208; border: 1px solid #3d2f0c; border-radius: 10px; padding: 0.65rem 0.9rem; margin-top: 0.75rem; font-size: 0.8rem; color: #d97706; line-height: 1.5; }
    .watch-box strong { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.2rem; color: #f59e0b; }

    /* Archive table */
    .arch-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .arch-table th { text-align: left; color: #52525b; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.5rem 0.4rem; border-bottom: 1px solid #27272a; font-weight: 600; }
    .arch-table th:nth-child(n+2) { text-align: right; }
    .arch-table td { padding: 0.45rem 0.4rem; border-bottom: 1px solid #1e1e21; color: #a1a1aa; }
    .arch-table td:nth-child(n+2) { text-align: right; }
    .arch-table tr { cursor: pointer; }
    .arch-table tr:hover td { background: #1c1c1f; }
    .arch-table tr.active td { background: #1e2030; color: #e4e4e7; }

    /* Collapsible sections */
    .section-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
    .section-toggle:hover .card-title { color: #71717a; }
    .toggle-icon { font-size: 0.75rem; color: #52525b; transition: transform 0.2s; }
    .toggle-icon.open { transform: rotate(90deg); }
    .section-body { display: none; margin-top: 0.75rem; }
    .section-body.open { display: block; }

    /* Misc */
    .loading { text-align: center; color: #52525b; padding: 3rem 0; }
    .error-msg { text-align: center; color: #dc2626; padding: 2rem 0; }
    .empty-cat { font-size: 0.8rem; color: #52525b; padding: 0.5rem 0; }

    @media (max-width: 500px) {
      .status-grid { gap: 0.5rem; }
      .stat-value { font-size: 1.2rem; }
      .card-date { font-size: 0.88rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <nav class="top-nav">
      <div class="nav-left">
        <a href="/" class="nav-btn">&#x1f3e0; Home</a>
        <a href="/admin/" class="nav-btn nav-btn-admin">&#x1f6e0;&#xfe0f; Admin</a>
      </div>
      <a href="index.html" class="nav-btn nav-btn-accent">&#x1f4ca; Raccolta &#x2192;</a>
    </nav>
    <div class="header">
      <h1>&#x1f9e0; Analisi AI Rassegna</h1>
      <p class="subtitle">Analisi editoriale automatica per categoria</p>
    </div>
    <div id="status-section"><div class="loading">Caricamento analisi...</div></div>
    <div id="analysis-section"></div>
    <div id="archive-section"></div>
  </div>

<script>
var CAT_LABELS={geopolitica:"\u{1f30d} Geopolitica",cronaca_ticino:"\u{1f3d4}\ufe0f Cronaca Ticino",economia:"\u{1f4b0} Economia",cultura:"\u{1f3ad} Cultura",cronaca_svizzera:"\u{1f1e8}\u{1f1ed} Cronaca Svizzera",ai_openclaw:"\u{1f916} AI & Tech"};
function catLabel(c){return CAT_LABELS[c]||c}
function formatTime(ts){
  if(!ts)return"\u2014";
  try{var d=new Date(ts.replace(" ","T").replace(/\+00:00$/,"Z"));return d.toLocaleString("it-CH",{timeZone:"Europe/Zurich",dateStyle:"medium",timeStyle:"short"})}catch(e){return ts}
}
function escHtml(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function statusBadge(st){
  var cls=st==="ok"?"badge-ok":st==="partial"?"badge-partial":"badge-error";
  var icon=st==="ok"?"\u2705":st==="partial"?"\u26a0\ufe0f":"\u274c";
  return "<span class=\"status-badge "+cls+"\">"+icon+" "+escHtml(st)+"</span>";
}
function toggleSection(id){
  var b=document.getElementById(id+"-body"),i=document.getElementById(id+"-icon");
  if(b&&i){b.classList.toggle("open");i.classList.toggle("open")}
}

var allData=null,currentIdx=0;

async function loadData(){
  try{
    var r=await fetch("../analisi.json?t="+Date.now());
    if(!r.ok)throw new Error("HTTP "+r.status);
    allData=await r.json();
    if(!allData.analyses||allData.analyses.length===0)throw new Error("Nessuna analisi nel file");
    renderStatus(allData.analyses[0]);
    renderAnalysis(allData.analyses[0]);
    renderArchive(allData.analyses,0);
  }catch(e){
    document.getElementById("status-section").innerHTML="<div class=\"card\"><div class=\"card-title\">Stato</div><p class=\"empty-cat\">\u274c Errore: "+escHtml(e.message)+"</p></div>";
  }
}

function renderStatus(entry){
  var h="<div class=\"card\"><div class=\"card-title\">Ultima Analisi</div>";
  h+="<div class=\"card-meta\">";
  h+="<div class=\"card-meta-left\">";
  h+="<span class=\"card-date\">\u{1f4c5} "+formatTime(entry.analyzed_at)+"</span>";
  h+="<span class=\"card-model\">\u{1f916} "+escHtml(entry.model_used||"\u2014")+"</span>";
  h+="</div>";
  h+="<div style=\"text-align:right\">";
  h+=statusBadge(entry.status||"ok");
  h+="<div style=\"font-size:0.72rem;color:#71717a;margin-top:0.2rem\">Run #"+entry.run_id+"</div>";
  h+="</div></div>";
  h+="<div class=\"status-grid\">";
  h+="<div class=\"stat-box\"><div class=\"stat-value\">"+(entry.articles_analyzed||0)+"</div><div class=\"stat-label\">Analizzati</div></div>";
  h+="<div class=\"stat-box\"><div class=\"stat-value\">"+(entry.articles_selected||0)+"</div><div class=\"stat-label\">Selezionati</div></div>";
  h+="<div class=\"stat-box\"><div class=\"stat-value\">"+(entry.data?entry.data.length:0)+"</div><div class=\"stat-label\">Categorie</div></div>";
  h+="</div></div>";
  document.getElementById("status-section").innerHTML=h;
}

function renderAnalysis(entry){
  if(!entry.data||entry.data.length===0){
    document.getElementById("analysis-section").innerHTML="<div class=\"card\"><p class=\"empty-cat\">Nessun dato disponibile.</p></div>";
    return;
  }
  var h="";
  entry.data.forEach(function(catData){
    var cat=catData.categoria||"";
    var notizie=catData.notizie||[];
    var trend=catData.trend||[];
    h+="<div class=\"card\">";
    h+="<div class=\"cat-header\"><span class=\"cat-label\">"+catLabel(cat)+"</span></div>";
    if(catData.sommario)h+="<p class=\"cat-sommario\">"+escHtml(catData.sommario)+"</p>";
    if(notizie.length===0){h+="<p class=\"empty-cat\">Nessuna notizia selezionata.</p>"}
    else{notizie.forEach(function(news){
      h+="<div class=\"news-item\"><div class=\"news-title-row\">";
      if(news.link){h+="<a class=\"news-title\" href=\""+escHtml(news.link)+"\" target=\"_blank\" rel=\"noopener\">"+escHtml(news.titolo)+"</a>"}
      else{h+="<span class=\"news-title\">"+escHtml(news.titolo)+"</span>"}
      if(news.fonte)h+=" <span class=\"badge badge-fonte\">"+escHtml(news.fonte)+"</span>";
      if(news.rilevanza==="alta")h+=" <span class=\"badge badge-alta\">\u25cf alta</span>";
      else if(news.rilevanza==="media")h+=" <span class=\"badge badge-media\">\u25cf media</span>";
      if(news.incrocio&&news.fonti_incrocio&&news.fonti_incrocio.length>0)h+=" <span class=\"badge badge-incrocio\">\u{1f501} "+news.fonti_incrocio.length+" fonti</span>";
      h+="</div>";
      if(news.riassunto)h+="<p class=\"news-riassunto\">"+escHtml(news.riassunto)+"</p>";
      if(news.incrocio&&news.differenze_narrative){
        var uid="diff_"+Math.random().toString(36).slice(2);
        h+="<button class=\"diff-toggle\" onclick=\"toggleDiff(this,&apos;"+uid+"&apos;)\">\u25b6 Differenze narrative</button>";
        h+="<div class=\"diff-content\" id=\""+uid+"\">"+escHtml(news.differenze_narrative)+"</div>";
      }
      h+="</div>";
    })}
    if(trend.length>0){
      h+="<div class=\"trend-section\"><div class=\"trend-label\">\u{1f4c8} Trend</div><div class=\"trend-pills\">";
      trend.forEach(function(t){h+="<span class=\"trend-pill\">"+escHtml(t)+"</span>"});
      h+="</div></div>";
    }
    if(catData.da_tenere_d_occhio){
      h+="<div class=\"watch-box\"><strong>\u{1f441} Da tenere d&apos;occhio</strong>"+escHtml(catData.da_tenere_d_occhio)+"</div>";
    }
    h+="</div>";
  });
  document.getElementById("analysis-section").innerHTML=h;
}

function toggleDiff(btn,id){
  var el=document.getElementById(id);
  if(!el)return;
  el.classList.toggle("open");
  btn.textContent=el.classList.contains("open")?"\u25bc Differenze narrative":"\u25b6 Differenze narrative";
}

function renderArchive(analyses,activeIdx){
  if(!analyses||analyses.length<=1){document.getElementById("archive-section").innerHTML="";return}
  var h="<div class=\"card\">";
  h+="<div class=\"section-toggle\" onclick=\"toggleSection('archive')\">";
  h+="<div class=\"card-title\" style=\"margin-bottom:0\">\u25b6 Archivio Analisi ("+analyses.length+")</div>";
  h+="<span class=\"toggle-icon\" id=\"archive-icon\">\u25b6</span></div>";
  h+="<div class=\"section-body\" id=\"archive-body\">";
  h+="<div style=\"overflow-x:auto\"><table class=\"arch-table\">";
  h+="<thead><tr><th>Data</th><th>Run</th><th>Analizzati</th><th>Selezionati</th><th>Status</th></tr></thead><tbody>";
  analyses.forEach(function(entry,idx){
    var cls=idx===activeIdx?"active":"";
    h+="<tr class=\""+cls+"\" onclick=\"selectAnalysis("+idx+")\">";
    h+="<td>"+formatTime(entry.analyzed_at)+"</td>";
    h+="<td>#"+entry.run_id+"</td>";
    h+="<td>"+(entry.articles_analyzed||0)+"</td>";
    h+="<td>"+(entry.articles_selected||0)+"</td>";
    h+="<td>"+statusBadge(entry.status||"ok")+"</td></tr>";
  });
  h+="</tbody></table></div></div></div>";
  document.getElementById("archive-section").innerHTML=h;
}

function selectAnalysis(idx){
  if(!allData||!allData.analyses)return;
  currentIdx=idx;
  renderStatus(allData.analyses[idx]);
  renderAnalysis(allData.analyses[idx]);
  renderArchive(allData.analyses,idx);
  window.scrollTo({top:0,behavior:"smooth"});
}

loadData();
</script>
</body>
</html>
