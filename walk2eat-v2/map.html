<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Navigazione • Walk2Eat</title>
  <link rel="icon" href="assets/branding-hq/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    /* Map takes most of the screen */
    .nav-map { height: calc(100dvh - 170px); min-height: 300px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--card-border); }

    /* Live tracking panel at top of map */
    .live-panel {
      position: absolute; top: 12px; left: 12px; right: 12px; z-index: 1000;
      display: flex; gap: 8px; justify-content: center; align-items: center;
      background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
      border-radius: 16px; padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff; font-size: 13px; font-weight: 600;
    }
    .live-stat { text-align: center; flex: 1; }
    .live-stat .val { font-size: 20px; font-weight: 800; color: var(--primary, #22c55e); }
    .live-stat .lbl { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.5); } }

    /* GPS accuracy ring */
    .gps-accuracy { border: 2px solid rgba(34,197,94,0.3); background: rgba(34,197,94,0.08); border-radius: 50%; }

    /* User position blue dot */
    .user-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: #3b82f6; border: 3px solid #fff;
      box-shadow: 0 0 8px rgba(59,130,246,0.6), 0 0 20px rgba(59,130,246,0.3);
    }
    .user-dot-heading {
      width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent;
      border-bottom: 14px solid #3b82f6; position: absolute; top: -14px; left: 3px;
      filter: drop-shadow(0 0 3px rgba(59,130,246,0.5));
    }

    /* Layer switch */
    .map-layer-toggle {
      position: absolute; bottom: 12px; right: 12px; z-index: 1000;
      display: flex; gap: 4px; background: rgba(15,23,42,0.85);
      border-radius: 20px; padding: 4px; backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .map-layer-btn {
      border: none; cursor: pointer; padding: 5px 10px; border-radius: 16px;
      font-size: 11px; font-weight: 600; transition: all .2s;
      background: transparent; color: rgba(255,255,255,0.5);
    }
    .map-layer-btn.active { background: var(--primary, #22c55e); color: #fff; }

    /* Center-on-me button */
    .center-btn {
      position: absolute; bottom: 12px; left: 12px; z-index: 1000;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .center-btn.tracking { background: var(--primary, #22c55e); color: #fff; }

    /* Progress bar */
    .progress-bar-container {
      position: absolute; bottom: 52px; left: 12px; right: 12px; z-index: 1000;
      height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;
      overflow: hidden;
    }
    .progress-bar-fill { height: 100%; background: var(--primary, #22c55e); border-radius: 3px; transition: width 0.5s; width: 0%; }

    .map-loading { min-height: 300px; }
  </style>
</head>
<body>
<div class="container page-enter">

  <div class="top-header">
    <a class="brand" href="dashboard.html">
      <img class="brand-logo" src="assets/branding-hq/walk2eat-navbar-dark-128.png" alt="Walk2Eat">
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </a>
    <a class="btn btn-ghost" href="dashboard.html">← Home</a>
  </div>

  <div class="card" style="padding:0;overflow:visible">
    <div id="loadingBox" class="map-loading">
      <div class="spinner"></div>
      <span id="loadingMsg">Ricerca posizione GPS…</span>
    </div>

    <div id="mapWrapper" style="position:relative;display:none">
      <div id="map" class="nav-map"></div>

      <!-- Live tracking panel -->
      <div class="live-panel" id="livePanel">
        <div class="live-dot"></div>
        <div class="live-stat">
          <div class="val" id="distRemain">--</div>
          <div class="lbl">Rimanenti</div>
        </div>
        <div class="live-stat">
          <div class="val" id="timeRemain">--</div>
          <div class="lbl">Min</div>
        </div>
        <div class="live-stat">
          <div class="val" id="distDone">0</div>
          <div class="lbl">Percorsi</div>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>

      <!-- Center on me button -->
      <button class="center-btn tracking" id="btnCenter" title="Centra su di me">📍</button>

      <!-- Layer switcher -->
      <div class="map-layer-toggle" id="layerToggle">
        <button class="map-layer-btn active" id="btnOsm">🗺️ OSM</button>
        <button class="map-layer-btn" id="btnSwiss">🏔️ Swiss</button>
      </div>
    </div>

    <div id="metaBox" style="display:none;padding:16px">
      <p class="small" id="errorMsg" style="display:none;color:var(--danger)"></p>
      <div class="btn-row">
        <button class="btn btn-primary" id="btnStart" style="flex:1">🚶 Avvia navigazione</button>
        <button class="btn btn-secondary" id="btnNewRoute" style="flex:1">🔄 Nuovo percorso</button>
      </div>
    </div>
  </div>

</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="map.html" class="nav-item active"><span class="nav-icon">🧭</span><span>Naviga</span></a>
    <a href="favorites.html" class="nav-item"><span class="nav-icon">❤️</span><span>Preferiti</span></a>
    <a href="history.html" class="nav-item"><span class="nav-icon">📋</span><span>Cronologia</span></a>
    <a href="preferences.html" class="nav-item"><span class="nav-icon">⚙️</span><span>Impostazioni</span></a>
  </div>
</nav>

<script src="assets/js/routes-poc-data.js?v=20260331b"></script>
<script src="assets/js/config.js?v=20260331b"></script>
<script src="assets/js/app.js?v=20260331b"></script>
<script>
(function() {
  var mapInstance = null;
  var routeLine = null;
  var userMarker = null;
  var accuracyCircle = null;
  var watchId = null;
  var isTracking = false;
  var autoCenter = true;
  var routePoints = []; // Array of {lat, lng}
  var totalRouteMeters = 0;
  var currentProposal = null;

  // --- Haversine distance in meters ---
  function distM(a, b) {
    var R = 6371000, dLat = (b.lat - a.lat) * Math.PI / 180, dLng = (b.lng - a.lng) * Math.PI / 180;
    var s = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }

  // --- Find nearest point on route and remaining distance ---
  function routeProgress(userPos) {
    if (!routePoints.length) return { nearestIdx: 0, distFromStart: 0, distToEnd: 0, fraction: 0 };
    var bestIdx = 0, bestDist = Infinity;
    for (var i = 0; i < routePoints.length; i++) {
      var d = distM(userPos, routePoints[i]);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    // Distance from start to nearest point
    var fromStart = 0;
    for (var j = 1; j <= bestIdx; j++) fromStart += distM(routePoints[j-1], routePoints[j]);
    var toEnd = totalRouteMeters - fromStart;
    return { nearestIdx: bestIdx, distFromStart: fromStart, distToEnd: Math.max(0, toEnd), fraction: fromStart / (totalRouteMeters || 1), offRoute: bestDist };
  }

  // --- Update live panel ---
  function updateLivePanel(progress) {
    var remainKm = (progress.distToEnd / 1000);
    var doneKm = (progress.distFromStart / 1000);
    document.getElementById('distRemain').textContent = remainKm < 1 ? Math.round(remainKm * 1000) + 'm' : remainKm.toFixed(1) + 'km';
    document.getElementById('distDone').textContent = doneKm < 1 ? Math.round(doneKm * 1000) + 'm' : doneKm.toFixed(1) + 'km';
    // Estimate time remaining: 75m/min walking speed
    var minRemain = Math.round(progress.distToEnd / 75);
    document.getElementById('timeRemain').textContent = minRemain;
    document.getElementById('progressFill').style.width = Math.min(100, Math.round(progress.fraction * 100)) + '%';
  }

  // --- Set loading state ---
  function setLoading(msg) {
    document.getElementById('loadingBox').style.display = 'flex';
    document.getElementById('mapWrapper').style.display = 'none';
    document.getElementById('metaBox').style.display = 'none';
    document.getElementById('loadingMsg').textContent = msg || 'Caricamento…';
  }

  function setError(msg) {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('mapWrapper').style.display = 'block';
    document.getElementById('metaBox').style.display = 'block';
    var e = document.getElementById('errorMsg');
    e.textContent = msg; e.style.display = 'block';
  }

  // --- Render the route on map ---
  function renderRoute(proposal) {
    currentProposal = proposal;
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('mapWrapper').style.display = 'block';
    document.getElementById('metaBox').style.display = 'block';
    document.getElementById('errorMsg').style.display = 'none';

    routePoints = proposal.route;
    // Calculate total route length
    totalRouteMeters = 0;
    for (var i = 1; i < routePoints.length; i++) totalRouteMeters += distM(routePoints[i-1], routePoints[i]);

    if (mapInstance) { mapInstance.remove(); mapInstance = null; }
    mapInstance = L.map('map', { zoomControl: false });

    // Tile layers
    window._tileLayers = {
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }),
      swiss: L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg', { attribution: '© swisstopo' })
    };
    window._activeLayer = 'osm';
    window._tileLayers.osm.addTo(mapInstance);

    // Draw route
    var pts = routePoints.map(function(p) { return [p.lat, p.lng]; });
    routeLine = L.polyline(pts, { color: '#22c55e', weight: 5, opacity: 0.8 }).addTo(mapInstance);

    // Start marker
    var startIcon = L.divIcon({ className: '', html: '<div style="background:#22c55e;color:#fff;padding:4px 10px;border-radius:10px;font-size:12px;font-weight:bold;white-space:nowrap">🏁 Partenza</div>', iconAnchor: [30, 10] });
    L.marker(pts[0], { icon: startIcon }).addTo(mapInstance);

    // Turnaround marker
    if (proposal.food && proposal.food.lat) {
      var turnIcon = L.divIcon({ className: '', html: '<div style="background:#f59e0b;color:#fff;padding:4px 10px;border-radius:10px;font-size:12px;font-weight:bold;white-space:nowrap">🔄 Svolta</div>', iconAnchor: [28, 10] });
      L.marker([proposal.food.lat, proposal.food.lng], { icon: turnIcon }).addTo(mapInstance);
    }

    mapInstance.fitBounds(L.latLngBounds(pts), { padding: [60, 30] });

    // Update button states
    document.getElementById('btnStart').textContent = '🚶 Avvia navigazione';
    isTracking = false;
    updateLivePanel({ distToEnd: totalRouteMeters, distFromStart: 0, fraction: 0 });
  }

  // --- GPS live tracking ---
  function startTracking() {
    if (!navigator.geolocation) { setError('GPS non disponibile'); return; }
    isTracking = true;
    autoCenter = true;
    document.getElementById('btnStart').textContent = '⏹ Stop navigazione';
    document.getElementById('btnCenter').classList.add('tracking');

    watchId = navigator.geolocation.watchPosition(function(pos) {
      var userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      var accuracy = pos.coords.accuracy || 20;

      // Update user dot
      if (userMarker) { userMarker.setLatLng([userPos.lat, userPos.lng]); }
      else {
        var dotIcon = L.divIcon({ className: '', html: '<div class="user-dot"></div>', iconSize: [18, 18], iconAnchor: [9, 9] });
        userMarker = L.marker([userPos.lat, userPos.lng], { icon: dotIcon, zIndexOffset: 1000 }).addTo(mapInstance);
      }

      // Accuracy circle
      if (accuracyCircle) { accuracyCircle.setLatLng([userPos.lat, userPos.lng]).setRadius(accuracy); }
      else { accuracyCircle = L.circle([userPos.lat, userPos.lng], { radius: accuracy, className: 'gps-accuracy', interactive: false }).addTo(mapInstance); }

      // Calculate progress
      var progress = routeProgress(userPos);
      updateLivePanel(progress);

      // Auto-center on user
      if (autoCenter && mapInstance) {
        mapInstance.setView([userPos.lat, userPos.lng], Math.max(mapInstance.getZoom(), 16), { animate: true });
      }

    }, function(err) {
      console.warn('GPS error:', err.message);
    }, { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 });
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    isTracking = false;
    document.getElementById('btnStart').textContent = '🚶 Avvia navigazione';
    if (userMarker) { mapInstance.removeLayer(userMarker); userMarker = null; }
    if (accuracyCircle) { mapInstance.removeLayer(accuracyCircle); accuracyCircle = null; }
  }

  // --- Load route ---
  async function loadRoute() {
    setLoading('Ricerca posizione GPS…');
    try {
      var gps = await LBW.getGPSPosition(5000);
      setLoading(gps ? 'GPS trovato! Calcolo percorso…' : 'Calcolo percorso…');
      var proposal = await LBW.buildWalkOnlyProposalAsync();
      if (!proposal || !proposal.route || !proposal.route.length) {
        if (proposal && proposal.error) setError('⚠️ ' + proposal.message);
        else setError('Impossibile generare il percorso.');
        return;
      }
      if (isTracking) stopTracking();
      renderRoute(proposal);
    } catch (e) {
      console.error(e);
      setError('Errore: ' + e.message);
    }
  }

  // --- Event listeners ---
  document.getElementById('btnStart').addEventListener('click', function() {
    if (isTracking) stopTracking(); else startTracking();
  });

  document.getElementById('btnNewRoute').addEventListener('click', function() {
    if (isTracking) stopTracking();
    loadRoute();
  });

  document.getElementById('btnCenter').addEventListener('click', function() {
    autoCenter = !autoCenter;
    this.classList.toggle('tracking', autoCenter);
    if (autoCenter && userMarker && mapInstance) {
      mapInstance.setView(userMarker.getLatLng(), Math.max(mapInstance.getZoom(), 16), { animate: true });
    }
  });

  // Layer switcher
  document.getElementById('btnOsm').addEventListener('click', function() { switchLayer('osm'); });
  document.getElementById('btnSwiss').addEventListener('click', function() { switchLayer('swiss'); });

  // Disable auto-center when user drags the map
  // We attach this after map is created — use MutationObserver to wait
  var mapReadyInterval = setInterval(function() {
    if (mapInstance) {
      mapInstance.on('dragstart', function() {
        autoCenter = false;
        document.getElementById('btnCenter').classList.remove('tracking');
      });
      clearInterval(mapReadyInterval);
    }
  }, 200);

  // Start
  loadRoute();
})();

function switchLayer(name) {
  if (!window._tileLayers || !window._activeLayer || window._activeLayer === name) return;
  var map = window._tileLayers[window._activeLayer]._map;
  if (!map) return;
  window._tileLayers[window._activeLayer].remove();
  window._tileLayers[name].addTo(map);
  window._activeLayer = name;
  document.getElementById('btnOsm').classList.toggle('active', name === 'osm');
  document.getElementById('btnSwiss').classList.toggle('active', name === 'swiss');
}
</script>
</body>
</html>
