<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Navigazione • Walk2Eat v3</title>
  <link rel="icon" href="assets/branding-hq/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260401c">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.21.1/dist/maplibre-gl.js"></script>
  <style>
    /* ── Critico inline (stesso di dashboard) ── */
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #map-fullscreen {
      position: fixed !important;
      top: 0; left: 0; right: 0; bottom: 0;
      width: 100vw; height: 100vh;
      z-index: 1;
      background: #1a2744;
    }
    .top-bar {
      position: fixed !important;
      top: 0; left: 0; right: 0;
      z-index: 20;
      background: rgba(10,17,32,0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .bottom-card {
      position: fixed !important;
      bottom: 0; left: 0; right: 0;
      z-index: 30;
      background: rgba(10,17,32,0.94);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
      padding-bottom: 60px; /* nav height */
    }
    .bottom-nav {
      position: fixed !important;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(10,17,32,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .map-layer-pill {
      position: fixed !important;
      left: 12px;
      z-index: 25;
    }

    /* ── Live tracking panel (dentro bottom card) ── */
    .live-stats {
      display: flex;
      gap: 0;
      justify-content: space-around;
      padding: 4px 0 8px;
    }
    .live-stat {
      text-align: center;
      flex: 1;
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .live-stat:last-child { border-right: none; }
    .live-stat .val { font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1.1; }
    .live-stat .lbl { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* Progress bar */
    .progress-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin: 8px 0;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s;
      width: 0%;
    }

    /* Pill view mode — floating top-left sotto la top-bar */
    .view-pills {
      position: fixed;
      top: 70px;
      left: 12px;
      z-index: 22;
      display: none;
      gap: 4px;
      flex-direction: row;
    }
    .view-pill {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 700;
      cursor: pointer;
      background: rgba(10,17,32,0.82);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      transition: all .2s;
    }
    .view-pill.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }

    /* Bottoni controllo — floating bottom-right, sopra il card */
    .map-controls {
      position: fixed;
      right: 12px;
      z-index: 25;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .ctrl-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10,17,32,0.85);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .ctrl-btn.active { background: var(--accent); color: #052e16; }
    .ctrl-btn:active { transform: scale(0.9); }

    /* Live dot */
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      animation: pulse-dot 2s infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.5)} }

    /* User location dot */
    .user-dot-outer {
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(59,130,246,0.25);
      display: flex; align-items: center; justify-content: center;
      animation: pulse-ring 2s infinite;
    }
    .user-dot-inner {
      width: 14px; height: 14px; border-radius: 50%;
      background: #3b82f6; border: 2.5px solid #fff;
      box-shadow: 0 0 6px rgba(59,130,246,0.6);
    }
    @keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.4} }

    /* Loading overlay */
    .map-loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(10,17,32,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text);
      font-size: 0.9rem;
    }
    .map-loading-overlay.hidden { display: none; }
  </style>
</head>
<body class="map-layout">

<!-- ══ z:1 — Mappa full-screen (MapLibre) ══ -->
<div id="map-fullscreen"></div>

<!-- ══ Loading overlay ══ -->
<div class="map-loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span id="loadingMsg">Ricerca posizione GPS…</span>
</div>

<!-- ══ z:20 — Top bar floating ══ -->
<div class="top-bar">
  <div class="top-bar-inner">
    <a class="brand" href="dashboard.html">
      <img class="brand-logo" src="assets/branding-hq/walk2eat-navbar-dark-128.png" alt="Walk2Eat">
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </a>
    <span id="navStatus" class="small" style="color:var(--accent)"></span>
  </div>
</div>

<!-- ══ z:22 — View mode pills (mostrate solo durante navigazione) ══ -->
<div class="view-pills" id="viewPills">
  <div class="view-pill" id="viewTop" data-view="top">🗺️ Mappa</div>
  <div class="view-pill" id="view3d" data-view="3d">🏔️ 3D</div>
  <div class="view-pill active" id="viewFollow" data-view="follow">🧭 Segui</div>
</div>

<!-- ══ z:25 — Layer toggle pill ══ -->
<div class="map-layer-pill" id="layerPill" style="display:none">
  <button class="map-layer-btn active" id="layerOsm" data-layer="osm">🗺️ OSM</button>
  <button class="map-layer-btn" id="layerSwiss" data-layer="swiss">🏔️ Swiss</button>
</div>

<!-- ══ z:25 — Bottoni controllo (posizionati via JS) ══ -->
<div class="map-controls" id="mapControls" style="display:none">
  <button class="ctrl-btn" id="btnCenter" title="Centra su di me">📍</button>
  <button class="ctrl-btn" id="btnStart" title="Avvia navigazione">▶️</button>
</div>

<!-- ══ z:30 — Bottom Card ══ -->
<div class="bottom-card" id="bottomCard">
  <div class="bottom-card-handle-area">
    <div class="bottom-card-handle"></div>
  </div>
  <div class="bottom-card-content">

    <!-- Stato: nessun percorso -->
    <div id="noRouteMsg" style="display:none;text-align:center;padding:12px 0">
      <div style="font-size:1.5rem;margin-bottom:8px">🗺️</div>
      <div style="font-weight:700;margin-bottom:4px">Nessun percorso</div>
      <div class="small" style="margin-bottom:12px">Genera un percorso dalla Home</div>
      <a class="btn btn-primary btn-block" href="dashboard.html">Vai alla Home</a>
    </div>

    <!-- Stato: percorso caricato -->
    <div id="routeInfo" style="display:none">
      <!-- Nome destinazione -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="live-dot" id="liveDot" style="display:none"></span>
        <span style="font-weight:700;font-size:var(--t-base)" id="destName">—</span>
        <span class="small" id="destCuisine"></span>
      </div>

      <!-- Progress bar (tracking) -->
      <div class="progress-bar-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>

      <!-- Live stats (tracking) -->
      <div class="live-stats" id="livePanel" style="display:none">
        <div class="live-stat"><div class="val" id="distRemain">--</div><div class="lbl">Rimanenti</div></div>
        <div class="live-stat"><div class="val" id="timeRemain">--</div><div class="lbl">Minuti</div></div>
        <div class="live-stat"><div class="val" id="distDone">0</div><div class="lbl">Percorsi</div></div>
      </div>

      <!-- Bottoni -->
      <div class="action-row" style="margin-top:8px">
        <button class="btn btn-primary" id="btnStart2">▶️ Naviga</button>
        <button class="btn btn-ghost btn-sm" id="btnCenter2">📍 Centra</button>
      </div>
    </div>

  </div>
</div>

<!-- ══ z:100 — Bottom Navigation ══ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span><span>Oggi</span></a>
    <a href="favorites.html" class="nav-item"><span class="nav-icon">❤️</span><span>Preferiti</span></a>

  </div>

<script src="assets/js/routes-poc-data.js?v=20260331c"></script>
<script src="assets/js/config.js?v=20260331c"></script>
<script src="assets/js/app.js?v=20260331c"></script>
<script src="assets/js/themes.js?v=20260331c"></script>
<script>
(function() {
  var map = null;
  var userMarker = null;
  var watchId = null;
  var isTracking = false;
  var autoCenter = true;
  var viewMode = 'follow';
  var routePoints = [];
  var totalRouteMeters = 0;
  var currentProposal = null;
  var lastUserPos = null;
  var lastHeading = null;
  var currentLayerId = 'osm';

  var TILE_SOURCES = {
    osm:   { tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], attribution: '© OpenStreetMap', maxzoom: 19 },
    swiss: { tiles: ['https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg'], attribution: '© swisstopo', maxzoom: 18 }
  };

  function distM(a, b) {
    var R = 6371000, dLat = (b.lat-a.lat)*Math.PI/180, dLng = (b.lng-a.lng)*Math.PI/180;
    var s = Math.sin(dLat/2)**2 + Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
  }

  function routeProgress(userPos) {
    if (!routePoints.length) return { nearestIdx: 0, distFromStart: 0, distToEnd: 0, fraction: 0, offRoute: 999 };
    var bestIdx = 0, bestDist = Infinity;
    for (var i = 0; i < routePoints.length; i++) {
      var d = distM(userPos, routePoints[i]);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    var fromStart = 0;
    for (var j = 1; j <= bestIdx; j++) fromStart += distM(routePoints[j-1], routePoints[j]);
    return { nearestIdx: bestIdx, distFromStart: fromStart, distToEnd: Math.max(0, totalRouteMeters - fromStart), fraction: fromStart / (totalRouteMeters || 1), offRoute: bestDist };
  }

  function updatePanel(prog) {
    var rKm = prog.distToEnd / 1000, dKm = prog.distFromStart / 1000;
    document.getElementById('distRemain').textContent = rKm < 1 ? Math.round(rKm*1000) + 'm' : rKm.toFixed(1) + 'km';
    document.getElementById('distDone').textContent = dKm < 1 ? Math.round(dKm*1000) + 'm' : dKm.toFixed(1) + 'km';
    document.getElementById('timeRemain').textContent = Math.round(prog.distToEnd / 75);
    document.getElementById('progressFill').style.width = Math.min(100, Math.round(prog.fraction * 100)) + '%';
  }

  function positionControls() {
    var card = document.getElementById('bottomCard');
    var cardH = card.offsetHeight;
    var navH = 60;
    var bottom = cardH + navH + 12;
    document.getElementById('mapControls').style.bottom = bottom + 'px';
    document.getElementById('layerPill').style.bottom = bottom + 'px';
  }

  function makeStyle(layerId) {
    var src = TILE_SOURCES[layerId];
    return {
      version: 8,
      sources: { 'raster-tiles': { type: 'raster', tiles: src.tiles, tileSize: 256, attribution: src.attribution, maxzoom: src.maxzoom } },
      layers: [{ id: 'raster-layer', type: 'raster', source: 'raster-tiles' }]
    };
  }

  function bearing(a, b) {
    var dLng = (b.lng - a.lng) * Math.PI / 180;
    var lat1 = a.lat * Math.PI / 180, lat2 = b.lat * Math.PI / 180;
    var y = Math.sin(dLng) * Math.cos(lat2);
    var x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function renderRoute(proposal) {
    currentProposal = proposal;
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('noRouteMsg').style.display = 'none';
    document.getElementById('routeInfo').style.display = 'block';
    document.getElementById('mapControls').style.display = 'flex';
    document.getElementById('layerPill').style.display = 'flex';

    document.getElementById('destName').textContent = proposal.food.name || 'Destinazione';
    document.getElementById('destCuisine').textContent = proposal.food.cuisine || '';

    routePoints = proposal.route;
    totalRouteMeters = 0;
    for (var i = 1; i < routePoints.length; i++) totalRouteMeters += distM(routePoints[i-1], routePoints[i]);

    var lats = routePoints.map(function(p){return p.lat;}), lngs = routePoints.map(function(p){return p.lng;});
    var sw = [Math.min.apply(null, lngs), Math.min.apply(null, lats)];
    var ne = [Math.max.apply(null, lngs), Math.max.apply(null, lats)];

    if (map) { map.remove(); map = null; userMarker = null; }

    map = new maplibregl.Map({
      container: 'map-fullscreen',
      style: makeStyle(currentLayerId),
      bounds: [sw, ne],
      fitBoundsOptions: {
        padding: { top: 80, bottom: document.getElementById('bottomCard').offsetHeight + 80, left: 30, right: 30 }
      },
      pitch: 55,
      maxPitch: 70,
      attributionControl: false
    });
    map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-right');

    map.on('load', function() {
      var coords = routePoints.map(function(p) { return [p.lng, p.lat]; });
      map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
      map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#22c55e', 'line-width': 12, 'line-opacity': 0.2, 'line-blur': 6 } });
      map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#22c55e', 'line-width': 4, 'line-opacity': 0.95 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });

      var startEl = document.createElement('div');
      startEl.innerHTML = '<div style="background:#22c55e;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.4)">🏁 Partenza</div>';
      new maplibregl.Marker({ element: startEl, anchor: 'bottom' }).setLngLat([routePoints[0].lng, routePoints[0].lat]).addTo(map);

      if (proposal.food && proposal.food.lat) {
        var turnEl = document.createElement('div');
        var emoji = proposal.food.poiType === 'viewpoint' ? '🏔️' : proposal.food.poiType === 'park' ? '🌳' : '🍽️';
        turnEl.innerHTML = '<div style="background:#f59e0b;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.4)">' + emoji + ' ' + (proposal.food.name || 'Svolta') + '</div>';
        new maplibregl.Marker({ element: turnEl, anchor: 'bottom' }).setLngLat([proposal.food.lng, proposal.food.lat]).addTo(map);
      }
    });

    map.on('dragstart', function() {
      autoCenter = false;
      document.getElementById('btnCenter').classList.remove('active');
      document.getElementById('btnCenter2').classList.remove('active');
    });

    updatePanel({ distToEnd: totalRouteMeters, distFromStart: 0, fraction: 0 });
    positionControls();
    setTimeout(function() { startTracking(); setView('follow'); }, 400);
  }

  function setView(mode) {
    viewMode = mode;
    document.querySelectorAll('.view-pill').forEach(function(el) { el.classList.toggle('active', el.dataset.view === mode); });
    if (!map) return;
    if (mode === 'top')    map.easeTo({ pitch: 0, bearing: 0, duration: 800 });
    else if (mode === '3d') map.easeTo({ pitch: 55, duration: 800 });
    else if (mode === 'follow') {
      map.easeTo({ pitch: 60, zoom: 17, duration: 800 });
      autoCenter = true;
    }
  }

  function startTracking() {
    if (!navigator.geolocation) return;
    isTracking = true;
    autoCenter = true;
    document.getElementById('btnStart').innerHTML = '⏹';
    document.getElementById('btnStart').classList.add('active');
    document.getElementById('btnStart2').innerHTML = '⏹ Stop';
    document.getElementById('btnCenter').classList.add('active');
    document.getElementById('liveDot').style.display = 'inline-block';
    document.getElementById('livePanel').style.display = 'flex';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('viewPills').style.display = 'flex';
    positionControls();

    watchId = navigator.geolocation.watchPosition(function(pos) {
      var userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      if (!userMarker) {
        var el = document.createElement('div');
        el.className = 'user-dot-outer';
        el.innerHTML = '<div class="user-dot-inner"></div>';
        userMarker = new maplibregl.Marker({ element: el, anchor: 'center' }).setLngLat([userPos.lng, userPos.lat]).addTo(map);
      } else {
        userMarker.setLngLat([userPos.lng, userPos.lat]);
      }
      var prog = routeProgress(userPos);
      updatePanel(prog);
      if (lastUserPos && distM(lastUserPos, userPos) > 3) lastHeading = bearing(lastUserPos, userPos);
      if (autoCenter && map) {
        var opts = { center: [userPos.lng, userPos.lat], duration: 600 };
        if (viewMode === 'follow' && lastHeading !== null) { opts.bearing = lastHeading; opts.pitch = 60; opts.zoom = Math.max(map.getZoom(), 17); }
        map.easeTo(opts);
      }
      lastUserPos = userPos;
    }, function(err) { console.warn('GPS:', err.message); }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 });
  }

  function stopTracking() {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    isTracking = false;
    document.getElementById('btnStart').innerHTML = '▶️';
    document.getElementById('btnStart').classList.remove('active');
    document.getElementById('btnStart2').innerHTML = '▶️ Naviga';
    document.getElementById('liveDot').style.display = 'none';
    document.getElementById('livePanel').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('viewPills').style.display = 'none';
    if (userMarker) { userMarker.remove(); userMarker = null; }
    lastUserPos = null; lastHeading = null;
    setView('top');
    positionControls();
  }

  function toggleTracking() {
    if (isTracking) stopTracking(); else startTracking();
  }

  function loadRoute() {
    document.getElementById('loadingOverlay').classList.remove('hidden');
    try {
      var proposal = LBW.Store.get('lbw_today', null);
      if (!proposal || !proposal.route || !proposal.route.length) {
        document.getElementById('loadingOverlay').classList.add('hidden');
        document.getElementById('noRouteMsg').style.display = 'block';
        return;
      }
      renderRoute(proposal);
    } catch(e) {
      console.error(e);
      document.getElementById('loadingOverlay').classList.add('hidden');
      document.getElementById('noRouteMsg').style.display = 'block';
    }
  }

  // Events
  document.getElementById('btnStart').addEventListener('click', toggleTracking);
  document.getElementById('btnStart2').addEventListener('click', toggleTracking);

  function centerOnUser() {
    autoCenter = !autoCenter;
    document.getElementById('btnCenter').classList.toggle('active', autoCenter);
    document.getElementById('btnCenter2').classList.toggle('active', autoCenter);
    if (autoCenter && lastUserPos && map) map.easeTo({ center: [lastUserPos.lng, lastUserPos.lat], zoom: Math.max(map.getZoom(), 16), duration: 600 });
  }
  document.getElementById('btnCenter').addEventListener('click', centerOnUser);
  document.getElementById('btnCenter2').addEventListener('click', centerOnUser);

  // Layer switch
  document.querySelectorAll('.map-layer-btn').forEach(function(el) {
    el.addEventListener('click', function() {
      var lid = this.dataset.layer || this.id.replace('layer','').toLowerCase();
      if (lid === currentLayerId || !map) return;
      var center = map.getCenter(), zoom = map.getZoom(), pitch = map.getPitch(), brng = map.getBearing();
      map.setStyle(makeStyle(lid));
      currentLayerId = lid;
      document.querySelectorAll('.map-layer-btn').forEach(function(b) { b.classList.toggle('active', (b.dataset.layer || b.id.replace('layer','').toLowerCase()) === lid); });
      map.once('style.load', function() {
        if (!currentProposal) return;
        var coords = routePoints.map(function(p) { return [p.lng, p.lat]; });
        map.addSource('route', { type: 'geojson', data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } } });
        map.addLayer({ id: 'route-glow', type: 'line', source: 'route', paint: { 'line-color': '#22c55e', 'line-width': 12, 'line-opacity': 0.2, 'line-blur': 6 } });
        map.addLayer({ id: 'route-line', type: 'line', source: 'route', paint: { 'line-color': '#22c55e', 'line-width': 4, 'line-opacity': 0.95 }, layout: { 'line-cap': 'round', 'line-join': 'round' } });
        map.jumpTo({ center: center, zoom: zoom, pitch: pitch, bearing: brng });
      });
    });
  });

  // View mode
  document.querySelectorAll('.view-pill').forEach(function(el) {
    el.addEventListener('click', function() { setView(this.dataset.view); });
  });

  window.addEventListener('resize', positionControls);

  loadRoute();
})();
</script>
</body>
</html>
