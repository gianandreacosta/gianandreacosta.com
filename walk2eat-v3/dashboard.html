<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>La tua pausa • Walk2Eat v3</title>
  <link rel="icon" href="assets/branding-hq/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="map-layout">

<!-- ══ z:1 — Mappa full-screen ══ -->
<div id="map-fullscreen"></div>

<!-- ══ z:20 — Top bar floating ══ -->
<div class="top-bar">
  <div class="top-bar-inner">
    <a class="brand" href="dashboard.html">
      <img class="brand-logo" src="assets/branding-hq/walk2eat-navbar-dark-128.png" alt="Walk2Eat">
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </a>
    <span id="hello" class="small" style="color:var(--accent)"></span>
  </div>
</div>

<!-- ══ z:25 — Layer toggle pill (OSM / Swiss) ══ -->
<div class="map-layer-pill" id="layerPill" style="display:none">
  <button class="map-layer-btn active" id="btnOsm" onclick="switchLayer('osm')">🗺️ OSM</button>
  <button class="map-layer-btn" id="btnSwiss" onclick="switchLayer('swiss')">🏔️ Swiss</button>
</div>

<!-- ══ z:28 — Overlay scuro (attivo quando card è espanso) ══ -->
<div class="map-overlay" id="mapOverlay"></div>

<!-- ══ z:30 — Bottom Card ══ -->
<div class="bottom-card" id="bottomCard">

  <!-- Drag handle -->
  <div class="bottom-card-handle-area" id="dragHandle">
    <div class="bottom-card-handle"></div>
  </div>

  <div class="bottom-card-content">

    <!-- Skeleton (visibile durante caricamento) -->
    <div id="cardSkeleton">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px">
        <div>
          <div class="skeleton" style="height:44px;width:100px;border-radius:8px"></div>
          <div class="skeleton" style="height:10px;width:60px;margin-top:6px;border-radius:4px"></div>
        </div>
        <div style="text-align:right">
          <div class="skeleton" style="height:20px;width:120px;border-radius:6px"></div>
          <div class="skeleton" style="height:10px;width:80px;margin-top:6px;border-radius:4px"></div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="skeleton" style="height:48px;border-radius:12px"></div>
        <div class="skeleton" style="height:48px;border-radius:12px"></div>
        <div class="skeleton" style="height:48px;border-radius:12px"></div>
        <div class="skeleton" style="height:48px;border-radius:12px"></div>
      </div>
    </div>

    <!-- Contenuto reale (nascosto durante caricamento) -->
    <div id="cardContent" style="display:none">

      <!-- Riga riepilogo percorso -->
      <div class="route-summary">
        <div class="route-main">
          <span class="route-stat-value" id="walkStat">—</span>
          <span class="route-stat-unit">min · <span id="walkDist">—</span> km</span>
        </div>
        <div class="route-dest">
          <div class="route-dest-name" id="foodName">—</div>
          <div class="route-dest-sub" id="foodCuisine"></div>
        </div>
      </div>

      <!-- Azioni primarie -->
      <div class="action-row">
        <a class="btn btn-primary" href="map.html" id="btnGo">🧭 Vai!</a>
        <button class="btn btn-secondary" id="refreshWalk">🔄 Alternativa</button>
      </div>
      <div class="action-row-2" style="margin-top:8px">
        <button class="btn btn-ghost btn-sm" id="save">♡ Salva</button>
        <button class="btn btn-ghost btn-sm" id="detailToggle">📊 Dettagli</button>
      </div>

      <!-- Dettagli espandibili -->
      <div id="detailSection" class="bottom-card-details">
        <div class="grid grid-2" style="margin-bottom:12px">
          <div class="card" style="padding:12px">
            <div class="card-title" style="margin-bottom:8px">⏱ Tempi</div>
            <div id="timeBreakdown" class="small"></div>
          </div>
          <div class="card" style="padding:12px">
            <div class="card-title" style="margin-bottom:8px">🌤 Meteo</div>
            <div id="weatherBox" class="small"></div>
          </div>
        </div>
        <div class="card" style="padding:12px">
          <div class="card-title" style="margin-bottom:8px">💡 Perché questa proposta</div>
          <div id="whyBox" class="small"></div>
        </div>
        <p id="routeSourceNote" class="small mt-sm" style="display:none"></p>
      </div>

    </div><!-- /cardContent -->
  </div><!-- /bottom-card-content -->
</div><!-- /bottom-card -->

<!-- ══ z:100 — Bottom Navigation ══ -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="nav-item active">
      <span class="nav-icon">🏠</span>
      <span>Oggi</span>
    </a>
    <a href="favorites.html" class="nav-item">
      <span class="nav-icon">❤️</span>
      <span>Preferiti</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon">🕑</span>
      <span>Cronologia</span>
    </a>
    <a href="preferences.html" class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span>Impostazioni</span>
    </a>
  </div>
</nav>

<script src="assets/js/routes-poc-data.js?v=20260331a"></script>
<script src="assets/js/config.js?v=20260331a"></script>
<script src="assets/js/app.js?v=20260331a"></script>
<script src="assets/js/themes.js?v=20260331c"></script>
<script>
(function() {
  var HEART_OFF = '\u2661', HEART_ON = '\u2764\uFE0F';
  var u = LBW.getUser();
  // v3: se non loggato, crea utente demo automaticamente (per test)
  if (!u) {
    LBW.setUser({ name: 'Demo', email: 'demo@walk2eat.app' });
    u = LBW.getUser();
  }
  var prefs = LBW.getPrefs();

  document.getElementById('hello').textContent = 'Ciao ' + u.name + ' 👋';

  /* ── Mappa full-screen ── */
  var map = null, routeLine = null, startMarker = null, turnMarker = null;
  var currentProposal = null;

  function initMap() {
    if (map) return;
    map = L.map('map-fullscreen', {
      zoomControl: false,
      attributionControl: false
    });
    window._tileLayers = {
      osm:   L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
      swiss: L.tileLayer('https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.pixelkarte-farbe/default/current/3857/{z}/{x}/{y}.jpeg')
    };
    window._activeLayer = 'osm';
    window._tileLayers.osm.addTo(map);
    document.getElementById('layerPill').style.display = 'flex';
    positionLayerPill();
  }

  /* Posiziona la pill sopra il bottom card */
  function positionLayerPill() {
    var card = document.getElementById('bottomCard');
    var pill = document.getElementById('layerPill');
    var cardH = card.getBoundingClientRect().height;
    var navH  = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--bottom-nav-h')) || 60;
    pill.style.bottom = (cardH + navH + 8) + 'px';
  }

  /* ── Skeleton / ready ── */
  function setCardLoading() {
    document.getElementById('cardSkeleton').style.display = 'block';
    document.getElementById('cardContent').style.display = 'none';
  }

  function setCardReady() {
    document.getElementById('cardSkeleton').style.display = 'none';
    document.getElementById('cardContent').style.display = 'block';
    positionLayerPill();
  }

  /* ── Meteo mock ── */
  function weatherMock() {
    var d = new Date();
    var key = (d.getDate() + d.getMonth() + d.getHours()) % 4;
    if (key === 0) return { label: 'Sole', temp: 22, bad: false };
    if (key === 1) return { label: 'Nuvoloso', temp: 18, bad: false };
    if (key === 2) return { label: 'Pioggia leggera', temp: 14, bad: true };
    return { label: 'Vento forte', temp: 12, bad: true };
  }

  function renderWeather() {
    var w = weatherMock();
    var icon = w.label.includes('Sole') ? '☀️' : w.label.includes('Nuvoloso') ? '☁️' : w.label.includes('Pioggia') ? '🌧️' : '💨';
    document.getElementById('weatherBox').innerHTML =
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<span style="font-size:1.3rem">' + icon + '</span>' +
      '<span><b>' + w.label + '</b> ' + w.temp + '°C<br>' +
      '<span>' + (w.bad ? '⚠️ Condizioni sfavorevoli' : '✅ Condizioni buone') + '</span></span></div>';
  }

  function renderBreakdown(p) {
    var walkTotal = p.walk.minutes;
    var walkOut = Math.round(walkTotal / 2);
    var walkBack = walkTotal - walkOut;
    document.getElementById('timeBreakdown').innerHTML =
      '<div style="display:flex;flex-direction:column;gap:4px">' +
      '<div>🏃 Andata: <b>' + walkOut + ' min</b></div>' +
      '<div>🔙 Ritorno: <b>' + walkBack + ' min</b></div>' +
      '<hr style="border-color:var(--glass-border);margin:4px 0">' +
      '<div>📏 Totale: <b>' + walkTotal + ' min</b> · <b>' + p.walk.distanceKm + ' km</b></div></div>';
  }

  function renderWhy(p) {
    var reasons = [
      '🎯 Intensità: <b>' + prefs.intensity + '</b>',
      '🎪 Obiettivo: <b>' + prefs.goal + '</b>',
      '🔄 Percorso ad anello'
    ];
    document.getElementById('whyBox').innerHTML = reasons.map(function(r) {
      return '<div style="padding:3px 0">' + r + '</div>';
    }).join('');
  }

  function setFavButton(proposal) {
    var saveEl = document.getElementById('save');
    var isFav = LBW.isFavoriteRoute(proposal);
    if (isFav) {
      saveEl.innerHTML = HEART_ON + ' Salvato';
      saveEl.classList.add('btn-saved');
    } else {
      saveEl.innerHTML = HEART_OFF + ' Salva';
      saveEl.classList.remove('btn-saved');
    }
  }

  function renderProposal(p) {
    currentProposal = p;

    document.getElementById('walkStat').textContent = p.walk.minutes;
    document.getElementById('walkDist').textContent = p.walk.distanceKm;
    document.getElementById('foodName').textContent = p.food.name || '—';
    document.getElementById('foodCuisine').textContent = p.food.cuisine || '';

    setFavButton(p);
    renderBreakdown(p);
    renderWhy(p);
    renderWeather();

    initMap();
    setCardReady();

    // Disegna percorso
    var pts = (p.route || []).map(function(x) { return [x.lat, x.lng]; });
    if (routeLine)  { map.removeLayer(routeLine);  routeLine = null; }
    if (startMarker){ map.removeLayer(startMarker); startMarker = null; }
    if (turnMarker) { map.removeLayer(turnMarker);  turnMarker = null; }

    if (pts.length) {
      routeLine = L.polyline(pts, { color: '#22c55e', weight: 5, opacity: 0.95 }).addTo(map);

      var startIcon = L.divIcon({ className: '',
        html: '<div style="background:#22c55e;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.4)">📍</div>',
        iconAnchor: [12, 12] });
      startMarker = L.marker(pts[0], { icon: startIcon }).addTo(map);

      if (p.food && p.food.lat) {
        var turnIcon = L.divIcon({ className: '',
          html: '<div style="background:#f59e0b;color:#fff;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.4)">🍽️</div>',
          iconAnchor: [12, 12] });
        turnMarker = L.marker([p.food.lat, p.food.lng], { icon: turnIcon }).addTo(map);
      }

      // Padding bottom per non nascondere percorso dietro il card
      var cardH = document.getElementById('bottomCard').offsetHeight;
      var navH  = 60;
      map.fitBounds(L.latLngBounds(pts), { paddingBottomRight: [16, cardH + navH + 20], paddingTopLeft: [16, 80] });
    }

    var note = document.getElementById('routeSourceNote');
    if (p.source === 'osrm-loop') {
      note.textContent = '✅ Percorso reale su strade pedonali';
      note.style.display = 'block';
    } else if (p.source === 'synthetic-loop') {
      note.textContent = '⚠️ Percorso approssimato';
      note.style.display = 'block';
    }
  }

  /* ── Carica percorso ── */
  async function loadNewRoute(isAlternative) {
    var btn = document.getElementById('refreshWalk');
    btn.classList.add('loading');
    setCardLoading();
    try {
      var originOverride = (isAlternative && currentProposal && currentProposal.origin) ? currentProposal.origin : null;
      var proposal = await LBW.buildWalkOnlyProposalAsync(null, !!isAlternative, originOverride);
      if (proposal && proposal.error) {
        console.warn('⚠️ ' + proposal.message);
        return;
      }
      renderProposal(proposal);
    } catch(e) {
      console.warn('Errore:', e.message);
    } finally {
      btn.classList.remove('loading');
    }
  }

  document.getElementById('refreshWalk').onclick = function() { loadNewRoute(true); };

  /* ── Bottone Salva con heartbeat ── */
  document.getElementById('save').onclick = function() {
    if (!currentProposal) return;
    LBW.toggleFavoriteRoute(currentProposal);
    setFavButton(currentProposal);
    var btn = this;
    btn.classList.remove('heart-bounce');
    void btn.offsetWidth;
    btn.classList.add('heart-bounce');
    btn.addEventListener('animationend', function() { btn.classList.remove('heart-bounce'); }, { once: true });
  };

  /* ── Dettagli: espandi / comprimi card ── */
  var detailOpen = false;
  document.getElementById('detailToggle').onclick = function() {
    detailOpen = !detailOpen;
    var section = document.getElementById('detailSection');
    var overlay = document.getElementById('mapOverlay');
    if (detailOpen) {
      section.classList.add('visible');
      overlay.classList.add('active');
      this.innerHTML = '📊 Chiudi';
      positionLayerPill();
    } else {
      section.classList.remove('visible');
      overlay.classList.remove('active');
      this.innerHTML = '📊 Dettagli';
      positionLayerPill();
    }
  };

  /* Tap sull'overlay chiude i dettagli */
  document.getElementById('mapOverlay').onclick = function() {
    if (detailOpen) document.getElementById('detailToggle').click();
  };

  /* ── Drag-to-dismiss dettagli ── */
  (function() {
    var handle = document.getElementById('dragHandle');
    var card   = document.getElementById('bottomCard');
    var startY = 0, dragging = false;

    handle.addEventListener('touchstart', function(e) {
      startY = e.touches[0].clientY;
      dragging = true;
      card.style.transition = 'none';
    }, { passive: true });

    handle.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      var dy = e.touches[0].clientY - startY;
      if (dy > 0) card.style.transform = 'translateY(' + dy + 'px)';
    }, { passive: true });

    handle.addEventListener('touchend', function(e) {
      dragging = false;
      card.style.transition = '';
      var dy = e.changedTouches[0].clientY - startY;
      if (dy > 80 && detailOpen) {
        document.getElementById('detailToggle').click();
      }
      card.style.transform = '';
    });
  })();

  /* ── Avvio ── */
  loadNewRoute(false);

  /* Aggiorna posizione pill quando la finestra cambia dimensione */
  window.addEventListener('resize', positionLayerPill);

})();

/* ── Layer toggle OSM / Swiss ── */
function switchLayer(name) {
  if (!window._tileLayers || window._activeLayer === name) return;
  var m = window._tileLayers[window._activeLayer]._map;
  if (!m) return;
  window._tileLayers[window._activeLayer].remove();
  window._tileLayers[name].addTo(m);
  window._activeLayer = name;
  document.getElementById('btnOsm').classList.toggle('active', name === 'osm');
  document.getElementById('btnSwiss').classList.toggle('active', name === 'swiss');
}
</script>
</body>
</html>
