<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Ristorante &bull; Walk2Eat</title>
  <link rel="icon" href="assets/branding-hq/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="assets/css/styles.css?v=4.0.2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container page-enter">

  <div class="top-header">
    <a class="brand" href="dashboard.html">
      <img class="brand-logo" src="assets/branding-hq/walk2eat-navbar-dark-128.png" alt="Walk2Eat">
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </a>
    <a class="btn btn-ghost" href="proposal.html">&larr; Proposta</a>
  </div>

  <div class="card" id="box"></div>

</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a href="dashboard.html" class="nav-item">
      <span class="nav-icon"><i data-lucide="home"></i></span><span>Oggi</span>
    </a>
    <a href="favorites.html" class="nav-item">
      <span class="nav-icon"><i data-lucide="heart"></i></span><span>Preferiti</span>
    </a>
    <a href="history.html" class="nav-item">
      <span class="nav-icon"><i data-lucide="clock"></i></span><span>Cronologia</span>
    </a>
    <a href="preferences.html" class="nav-item">
      <span class="nav-icon"><i data-lucide="settings"></i></span><span>Impostazioni</span>
    </a>
  </div>
</nav>

<script src="https://unpkg.com/lucide@1.7.0/dist/umd/lucide.min.js"></script>
<script src="assets/js/routes-poc-data.js?v=4.0.2"></script>
<script src="assets/js/config.js?v=4.0.2"></script>
<script src="assets/js/app.js?v=4.0.2"></script>
<script src="assets/js/themes.js?v=4.0.2"></script>
<script>
(function() {
  if (!LBW.getUser()) { window.location.href = 'login.html'; return; }
  var HEART_OFF = '♡', HEART_ON = '❤️';
  var id = String(new URLSearchParams(location.search).get('id'));
  var all = [LBW.getProposal().food].concat(LBW.getProposal().alternatives || []);
  var r = all.find(function(x) { return String(x.id) === id; }) || LBW.getProposal().food;
  var fav = LBW.isFavoritePlace(r) ? HEART_ON : HEART_OFF;
  var info = [r.cuisine || 'Food spot'];
  if (r.price && r.price !== '-') info.push(r.price);
  var dist = (typeof r.distance === 'number') ? '<div class="small mt-sm">📏 Distanza: ' + r.distance.toFixed(2) + ' km</div>' : '';

  var box = document.getElementById('box');
  box.innerHTML =
    '<div style="text-align:center;padding:8px 0">' +
    '<div style="font-size:2.5rem;margin-bottom:8px"><i data-lucide="utensils" class="lucide" style="width:40px;height:40px;color:var(--accent)"></i></div>' +
    '<h2 style="font-size:1.3rem">' + r.name + '</h2>' +
    '<div class="small mt-sm">' + info.join(' &bull; ') + '</div>' +
    dist +
    '</div>' +
    '<div class="btn-row" style="justify-content:center">' +
    '<button class="btn btn-primary" id="saveBtn">' + fav + ' Preferito</button>' +
    (r.reserveUrl ? '<a class="btn btn-ghost" href="' + r.reserveUrl + '" target="_blank">📞 Riserva</a>' : '') +
    (r.preorderUrl ? '<a class="btn btn-ghost" href="' + r.preorderUrl + '" target="_blank">🛒 Pre-ordina</a>' : '') +
    '</div>';

  document.getElementById('saveBtn').onclick = function() {
    var on = LBW.toggleFavoritePlace(r);
    this.innerHTML = (on ? HEART_ON : HEART_OFF) + ' Preferito';
  };

  lucide.createIcons();
})();
</script>
</body>
</html>
