<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Preferiti</title><link rel='stylesheet' href='assets/css/styles.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script></head><body><div class='container'><div class='nav'><div class='brand'><img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' /><span class="brand-text">Walk<span class="brand-two">2</span>Eat</span></div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='history.html'>Cronologia</a><a class='btn ghost' href='preferences.html'>Preferenze</a></div></div><div class='card'><h3>Preferiti</h3><div style='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px'><button id='viewAll' class='btn secondary'>Lista completa (Percorsi + Ristoranti)</button><button id='viewRestaurants' class='btn ghost'>Solo ristoranti</button></div><div id='favList' class='list'></div></div></div><script src='assets/js/routes-poc-data.js'></script>
<script src='assets/js/app.js'></script><script>const HEART_ON='\u2764';const fp=LBW.Store.get('lbw_fav_places',[]),fr=LBW.Store.get('lbw_fav_routes',[]);const prefs=LBW.getPrefs();const list=document.getElementById('favList'),btnAll=document.getElementById('viewAll'),btnRest=document.getElementById('viewRestaurants');const maps={};function hav(a,b){const toRad=d=>d*Math.PI/180;const R=6371;const dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng);const s=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;return 2*R*Math.asin(Math.sqrt(s));}
function proposalFromPlace(x){const origin=prefs.location||{lat:46.0037,lng:8.9511,label:'Ufficio'};const dist=hav(origin,{lat:x.lat,lng:x.lng});const walk=Math.max(10,Math.round(dist*12));return{createdAt:new Date().toISOString(),walk:{minutes:walk,distanceKm:+(walk/12).toFixed(1),type:'semi-anello'},food:{...x,mealMode:prefs.mealMode||'Mangio fuori',etaEatMin:Math.max(10,(prefs.breakMinutes||45)-walk-8)},route:[{lat:origin.lat,lng:origin.lng},{lat:origin.lat+0.002,lng:origin.lng+0.0015},{lat:x.lat,lng:x.lng},{lat:origin.lat+0.001,lng:origin.lng-0.0015},{lat:origin.lat,lng:origin.lng}],alternatives:[]};}
function proposalFromRoute(r){const rid=String(r.routeId||'');const fid=rid.split('-')[0];const maybePlace=fp.find(p=>String(p.id)===fid)||{id:fid,name:r.destination,cuisine:'',price:'',lat:r.route?.[2]?.lat,lng:r.route?.[2]?.lng};return{createdAt:r.savedAt||new Date().toISOString(),walk:r.walk,food:{...maybePlace,mealMode:prefs.mealMode||'Mangio fuori',etaEatMin:15},route:r.route||[],alternatives:[]};}
function breakdown(walk,food){const walkTotal=walk?.minutes||0;const walkOut=Math.max(6,Math.floor(walkTotal*0.55));const walkBack=Math.max(4,walkTotal-walkOut);const orderMin=(food?.mealMode==='Ho già la schiscetta')?3:8;const lunchMin=Math.max(10,food?.etaEatMin||15);const total=walkOut+orderMin+lunchMin+walkBack;return `Andata: ${walkOut} min • Ordine: ${orderMin} min • Pranzo: ${lunchMin} min • Rientro: ${walkBack} min • Totale: ${total} min`;}
function drawMap(id,proposal){const mapId=`fmap-${id}`;const el=document.getElementById(mapId);if(!el||!proposal?.route||proposal.route.length<2)return;let m=maps[mapId];if(!m){m=L.map(mapId,{zoomControl:false,attributionControl:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);maps[mapId]=m;}const pts=proposal.route.map(x=>[x.lat,x.lng]);if(m._line)m.removeLayer(m._line);if(m._start)m.removeLayer(m._start);if(m._dest)m.removeLayer(m._dest);m._line=L.polyline(pts,{color:'#22c55e',weight:4}).addTo(m);m._start=L.marker(pts[0]).addTo(m).bindPopup('Partenza');m._dest=L.marker(pts[2]||pts[pts.length-1]).addTo(m).bindPopup(proposal.food?.name||'Destinazione');m.fitBounds(L.latLngBounds(pts),{padding:[18,18]});}
function bindDetail(items,type){setTimeout(()=>{items.forEach((x,i)=>{const tg=document.getElementById(`toggle${type}${i}`),dt=document.getElementById(`detail${type}${i}`),tm=document.getElementById(`time${type}${i}`),sl=document.getElementById(`select${type}${i}`),rm=document.getElementById(`rm${type}${i}`);if(tg)tg.onclick=()=>{const open=dt.style.display!=='none';dt.style.display=open?'none':'block';tg.textContent=open?'Mostra dettagli':'Nascondi dettagli';if(!open){const pr=type==='P'?proposalFromPlace(x):proposalFromRoute(x);tm.textContent=breakdown(pr.walk,pr.food);drawMap(`${type}${i}`,pr);}};if(sl)sl.onclick=()=>{const pr=type==='P'?proposalFromPlace(x):proposalFromRoute(x);LBW.Store.set('lbw_today',pr);window.location.href='dashboard.html';};if(rm)rm.onclick=()=>{if(type==='P')LBW.removeFavoritePlace(x);else LBW.removeFavoriteRoute(proposalFromRoute(x));location.reload();};});},0);}
function renderAll(){const placeHtml=fp.map((x,i)=>{const info=['Tipo: Ristorante/spot',x.cuisine];if(x.price&&x.price!=='-') info.push(x.price);return `<div class='card'><b>${x.name}</b><div class='small'>${info.join(' • ')}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='toggleP${i}'>Mostra dettagli</button><button class='btn ghost' id='rmP${i}'>${HEART_ON} Rimuovi ristorante</button></div><div id='detailP${i}' style='display:none;margin-top:8px'><div class='small' id='timeP${i}'></div><div id='fmap-P${i}' class='map-box' style='margin-top:8px;height:200px'></div><button class='btn secondary' id='selectP${i}' style='margin-top:8px'>Seleziona</button></div></div>`;});const routeHtml=fr.map((x,i)=>`<div class='card'><b>${x.destination}</b><div class='small'>Tipo: Percorso • ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='toggleR${i}'>Mostra dettagli</button><button class='btn ghost' id='rmR${i}'>${HEART_ON} Rimuovi percorso</button></div><div id='detailR${i}' style='display:none;margin-top:8px'><div class='small' id='timeR${i}'></div><div id='fmap-R${i}' class='map-box' style='margin-top:8px;height:200px'></div><button class='btn secondary' id='selectR${i}' style='margin-top:8px'>Seleziona</button></div></div>`);const all=[...placeHtml,...routeHtml];list.innerHTML=all.length?all.join(''):'<div class="small">Nessun preferito</div>';bindDetail(fp,'P');bindDetail(fr,'R');}
function renderRestaurants(){list.innerHTML=fp.length?fp.map((x,i)=>{const info=[x.cuisine];if(x.price&&x.price!=='-') info.push(x.price);return `<div class='card'><b>${x.name}</b><div class='small'>${info.join(' • ')}</div><div class='small'>Salvato: ${new Date(x.savedAt||Date.now()).toLocaleString()}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='toggleP${i}'>Mostra dettagli</button><button class='btn ghost' id='rmP${i}'>${HEART_ON} Rimuovi ristorante</button></div><div id='detailP${i}' style='display:none;margin-top:8px'><div class='small' id='timeP${i}'></div><div id='fmap-P${i}' class='map-box' style='margin-top:8px;height:200px'></div><button class='btn secondary' id='selectP${i}' style='margin-top:8px'>Seleziona</button></div></div>`;}).join(''):'<div class="small">Nessun ristorante preferito</div>';bindDetail(fp,'P');}
btnAll.onclick=()=>{btnAll.className='btn secondary';btnRest.className='btn ghost';renderAll();};btnRest.onclick=()=>{btnRest.className='btn secondary';btnAll.className='btn ghost';renderRestaurants();};renderAll();</script></body></html>
