<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ristorante</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'><img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' /><span class="brand-text">Walk<span class="brand-two">2</span>Eat</span></div><div class='nav-links'><a class='btn secondary' href='proposal.html'>Proposta</a><a class='btn ghost' href='favorites.html'>Preferiti</a><a class='btn ghost' href='preferences.html'>Preferenze</a></div></div><div class='card' id='box'></div></div><script src='assets/js/routes-poc-data.js'></script>
<script src='assets/js/app.js'></script><script>const HEART_OFF='\u2661',HEART_ON='\u2764';const id=String(new URLSearchParams(location.search).get('id'));const all=[LBW.getProposal().food,...LBW.getProposal().alternatives];const r=all.find(x=>String(x.id)===id)||LBW.getProposal().food;const fav=LBW.isFavoritePlace(r)?HEART_ON:HEART_OFF;const actions=[`<button class='btn' id='saveBtn'>${fav} Preferito</button>`];if(r.reserveUrl)actions.push(`<a class='btn ghost' href='${r.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`);if(r.preorderUrl)actions.push(`<a class='btn ghost' href='${r.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`);const info=[r.cuisine];if(r.price&&r.price!=='-') info.push(r.price);const dist=(typeof r.distance==='number')?`<p class='small'>Distanza: ${r.distance.toFixed(2)} km</p>`:'';box.innerHTML=`<h2>${r.name}</h2><p>${info.join(' • ')}</p>${dist}<div style='display:flex;gap:8px;flex-wrap:wrap'>${actions.join('')}</div>`;document.getElementById('saveBtn').onclick=()=>{const on=LBW.toggleFavoritePlace(r);document.getElementById('saveBtn').textContent=`${on?HEART_ON:HEART_OFF} Preferito`;};</script></body></html>
