<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Proposta</title><link rel='stylesheet' href='assets/css/styles.css'></head><body><div class='container'><div class='nav'><div class='brand'><img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' /><span class="brand-text">Walk<span class="brand-two">2</span>Eat</span></div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='map.html'>Mappa</a><a class='btn ghost' href='favorites.html'>Preferiti</a><a class='btn ghost' href='preferences.html'>Preferenze</a></div></div><div class='card'><h2>Proposta pausa pranzo</h2><div id='main'></div><h3>Alternative</h3><div id='alts' class='list'></div></div></div><script src='assets/js/routes-poc-data.js'></script>
<script src='assets/js/app.js'></script><script>const HEART_OFF='\u2661',HEART_ON='\u2764';const p=LBW.getProposal();const mainEl=document.getElementById('main');const altsEl=document.getElementById('alts');const mainFav=LBW.isFavoritePlace(p.food)?HEART_ON:HEART_OFF;const mainInfo=[p.food.cuisine];if(p.food.price&&p.food.price!=='-') mainInfo.push(p.food.price);mainEl.innerHTML=`<p><b>Camminata:</b> ${p.walk.minutes} min (${p.walk.distanceKm} km), ${p.walk.type}</p><p><b>Destinazione:</b> ${p.food.name} • ${mainInfo.join(' • ')}</p><p><b>Tempo stimato per pranzo:</b> ${p.food.etaEatMin} min</p><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button id='saveMain' class='btn ghost'>${mainFav} Preferito</button>${p.food.reserveUrl?`<a class='btn ghost' href='${p.food.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`:''}${p.food.preorderUrl?`<a class='btn ghost' href='${p.food.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`:''}</div>`;setTimeout(()=>{const b=document.getElementById('saveMain');if(b)b.onclick=()=>{const on=LBW.toggleFavoritePlace(p.food);b.textContent=`${on?HEART_ON:HEART_OFF} Preferito`;};},0);altsEl.innerHTML=p.alternatives.map((a,i)=>{const fav=LBW.isFavoritePlace(a)?HEART_ON:HEART_OFF;const info=[a.cuisine];if(a.price&&a.price!=='-') info.push(a.price);if(typeof a.distance==='number') info.push(`${a.distance.toFixed(2)} km`);return `<div class='card'><b>${a.name}</b><div class='small'>${info.join(' • ')}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><a class='btn ghost' href='place.html?id=${a.id}'>Apri scheda</a><button class='btn ghost' id='saveAlt${i}'>${fav} Preferito</button>${a.reserveUrl?`<a class='btn ghost' href='${a.reserveUrl}' target='_blank' rel='noopener'>Riserva</a>`:''}${a.preorderUrl?`<a class='btn ghost' href='${a.preorderUrl}' target='_blank' rel='noopener'>Pre-ordina</a>`:''}</div></div>`;}).join('');setTimeout(()=>{p.alternatives.forEach((a,i)=>{const b=document.getElementById(`saveAlt${i}`);if(b)b.onclick=()=>{const on=LBW.toggleFavoritePlace(a);b.textContent=`${on?HEART_ON:HEART_OFF} Preferito`;};});},0);</script></body></html>
