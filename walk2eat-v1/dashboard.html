<!doctype html>
<html lang='it'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>La tua pausa</title>
  <link rel='stylesheet' href='assets/css/styles.css'>
  <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'>
  <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
  <style>
    .map-loading {
      display:flex;align-items:center;justify-content:center;
      height:240px;border-radius:10px;
      background:rgba(34,197,94,0.05);color:var(--text-secondary,#888);
      font-size:0.9rem;gap:10px;
    }
    .spinner-sm {
      width:20px;height:20px;border:2px solid rgba(34,197,94,0.2);
      border-top-color:#22c55e;border-radius:50%;
      animation:spin 0.8s linear infinite;flex-shrink:0;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    #refreshWalk { position:relative; }
    #refreshWalk.loading { opacity:0.6; pointer-events:none; }
  </style>
</head>
<body>
<div class='container'>
  <div class='nav'>
    <div class='brand'>
      <img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' />
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </div>
    <div class='nav-links'>
      <a class='btn ghost' href='preferences.html'>Preferenze</a>
      <a class='btn ghost' href='history.html'>Cronologia</a>
      <a class='btn ghost' href='favorites.html'>Preferiti</a>
    </div>
  </div>

  <h2 id='hello'></h2>

  <div class='grid cols-2'>
    <div class='card'>
      <span class='badge'>Camminata</span>
      <h3 id='walk'>—</h3>
      <p id='walk2' class='small'></p>
    </div>
    <div class='card'>
      <span class='badge'>Percorso</span>
      <h3 id='food'>—</h3>
      <p id='food2' class='small'></p>
    </div>
  </div>

  <div class='card' style='margin-top:12px'>
    <div style='display:flex;justify-content:space-between;gap:8px;align-items:center'>
      <span class='badge'>Anteprima percorso</span>
      <span id='updatedAt' class='small'></span>
    </div>
    <div id='mapLoadingBox' class='map-loading' style='margin-top:8px'>
      <div class='spinner-sm'></div>
      <span id='mapLoadingMsg'>Calcolo percorso…</span>
    </div>
    <div id='mapPreview' class='map-box' style='margin-top:8px;height:240px;display:none'></div>
    <p id='routeSourceNote' class='small' style='margin-top:6px;display:none'></p>
  </div>

  <div style='display:flex;gap:10px;flex-wrap:wrap;margin-top:12px'>
    <a class='btn' href='map.html'>Segui il percorso</a>
    <button id='refreshWalk' class='btn secondary'>Alternativa</button>
    <button id='detailToggle' class='btn ghost'>Mostra dettagli</button>
    <button id='save' class='btn ghost'>♡ Preferiti</button>
  </div>

  <div id='detailPanel' style='display:none'>
    <div class='grid cols-2' style='margin-top:12px'>
      <div class='card'><h3>Tempi</h3><div id='timeBreakdown' class='small'></div></div>
      <div class='card'><h3>Meteo</h3><div id='weatherBox' class='small'></div></div>
    </div>
    <div class='card' style='margin-top:12px'><h3>Perché questa proposta</h3><div id='whyBox' class='small'></div></div>
  </div>
</div>

<script src='assets/js/routes-poc-data.js?v=20260318a'></script>
<script src='assets/js/config.js?v=20260318a'></script>
<script src='assets/js/app.js?v=20260318a'></script>
<script>
(function() {
  var HEART_OFF = '\u2661', HEART_ON = '\u2764';
  var u = LBW.getUser();
  if (!u) { location.href = 'login.html'; return; }
  var prefs = LBW.getPrefs();

  document.getElementById('hello').textContent = 'Ciao ' + u.name + ', ecco la tua pausa';

  var map = null, routeLine = null, startMarker = null, turnMarker = null;
  var currentProposal = null;

  function initMap() {
    if (map) return;
    map = L.map('mapPreview', { zoomControl: false, attributionControl: false });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  }

  function setMapLoading(msg) {
    document.getElementById('mapLoadingBox').style.display = 'flex';
    document.getElementById('mapLoadingMsg').textContent = msg || 'Calcolo percorso…';
    document.getElementById('mapPreview').style.display = 'none';
    document.getElementById('routeSourceNote').style.display = 'none';
  }

  function setMapReady() {
    document.getElementById('mapLoadingBox').style.display = 'none';
    document.getElementById('mapPreview').style.display = 'block';
  }

  function weatherMock() {
    var d = new Date();
    var key = (d.getDate() + d.getMonth() + d.getHours()) % 4;
    if (key === 0) return { label: 'Sole', temp: 22, bad: false };
    if (key === 1) return { label: 'Nuvoloso', temp: 18, bad: false };
    if (key === 2) return { label: 'Pioggia leggera', temp: 14, bad: true };
    return { label: 'Vento forte', temp: 12, bad: true };
  }

  function renderWeather() {
    var w = weatherMock();
    var icon = w.label.includes('Sole') ? '☀️' : w.label.includes('Nuvoloso') ? '☁️' : w.label.includes('Pioggia') ? '🌧️' : '💨';
    document.getElementById('weatherBox').innerHTML =
      '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:1.4rem">' + icon + '</span>' +
      '<span><b>' + w.label + '</b>, ' + w.temp + '°C ' + (w.bad ? '• condizioni sfavorevoli' : '• condizioni buone') + '</span></div>';
  }

  function renderBreakdown(p) {
    var walkTotal = p.walk.minutes;
    var walkOut = Math.round(walkTotal / 2);
    var walkBack = walkTotal - walkOut;
    document.getElementById('timeBreakdown').innerHTML =
      '<div>Andata: <b>~' + walkOut + ' min</b></div>' +
      '<div>Ritorno: <b>~' + walkBack + ' min</b></div>' +
      '<hr style="border-color:#334155">' +
      '<div>Totale: <b>' + walkTotal + ' min</b> • <b>' + p.walk.distanceKm + ' km</b></div>';
  }

  function renderWhy(p) {
    var reasons = [
      'Intensità: <b>' + prefs.intensity + '</b>.',
      'Obiettivo: <b>' + prefs.goal + '</b>.',
      'Percorso ad anello: parti e ritorni allo stesso punto.'
    ];
    document.getElementById('whyBox').innerHTML = '<ul>' + reasons.map(function(r) { return '<li>' + r + '</li>'; }).join('') + '</ul>';
  }

  function setFavButton(proposal) {
    var saveEl = document.getElementById('save');
    var routeFav = LBW.isFavoriteRoute(proposal);
    if (routeFav) { saveEl.textContent = HEART_ON + ' Preferiti'; saveEl.classList.add('secondary'); }
    else { saveEl.textContent = HEART_OFF + ' Preferiti'; saveEl.classList.remove('secondary'); }
  }

  function renderProposal(p) {
    currentProposal = p;
    var walkEl = document.getElementById('walk');
    var walk2El = document.getElementById('walk2');
    var foodEl = document.getElementById('food');
    var food2El = document.getElementById('food2');
    var updatedAtEl = document.getElementById('updatedAt');

    walkEl.textContent = p.walk.minutes + ' min • ' + p.walk.distanceKm + ' km';
    walk2El.textContent = p.walk.type || '';
    foodEl.textContent = p.food.name || 'Percorso pausa';
    food2El.textContent = p.food.cuisine || 'Passeggiata';
    updatedAtEl.textContent = 'Aggiornato: ' + new Date(p.createdAt).toLocaleTimeString();

    setFavButton(p);
    renderBreakdown(p);
    renderWhy(p);
    renderWeather();

    // Mappa
    initMap();
    setMapReady();
    var pts = (p.route || []).map(function(x) { return [x.lat, x.lng]; });
    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
    if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
    if (turnMarker) { map.removeLayer(turnMarker); turnMarker = null; }
    if (pts.length) {
      routeLine = L.polyline(pts, { color: '#22c55e', weight: 4, opacity: 0.9 }).addTo(map);
      var startIcon = L.divIcon({ className: '', html: '<div style="background:#22c55e;color:#fff;padding:3px 7px;border-radius:7px;font-size:11px;font-weight:bold">📍</div>', iconAnchor: [10, 10] });
      startMarker = L.marker(pts[0], { icon: startIcon }).addTo(map);
      if (p.food && p.food.lat) {
        var turnIcon = L.divIcon({ className: '', html: '<div style="background:#f59e0b;color:#fff;padding:3px 7px;border-radius:7px;font-size:11px;font-weight:bold">🔄</div>', iconAnchor: [10, 10] });
        turnMarker = L.marker([p.food.lat, p.food.lng], { icon: turnIcon }).addTo(map);
      }
      map.fitBounds(L.latLngBounds(pts), { padding: [20, 20] });
    }

    var note = document.getElementById('routeSourceNote');
    if (p.source === 'osrm-loop') {
      note.textContent = '✅ Percorso reale su strade pedonali';
      note.style.display = 'block';
    } else if (p.source === 'synthetic-loop') {
      note.textContent = '⚠️ Percorso approssimato (OSRM non raggiungibile)';
      note.style.display = 'block';
    }
  }

  async function loadNewRoute(isAlternative) {
    var btn = document.getElementById('refreshWalk');
    btn.classList.add('loading');
    setMapLoading(isAlternative ? 'Calcolo alternativa…' : 'Calcolo percorso…');
    try {
      var proposal = await LBW.buildWalkOnlyProposalAsync(null, !!isAlternative);
      renderProposal(proposal);
    } catch(e) {
      document.getElementById('mapLoadingMsg').textContent = 'Errore: ' + e.message;
    } finally {
      btn.classList.remove('loading');
    }
  }

  // Bottone alternativa
  document.getElementById('refreshWalk').onclick = function() { loadNewRoute(true); };

  // Preferiti
  document.getElementById('save').onclick = function() {
    if (!currentProposal) return;
    LBW.toggleFavoriteRoute(currentProposal);
    setFavButton(currentProposal);
  };

  // Dettagli
  document.getElementById('detailToggle').onclick = function() {
    var panel = document.getElementById('detailPanel');
    var isOpen = panel.style.display !== 'none';
    panel.style.display = isOpen ? 'none' : 'block';
    this.textContent = isOpen ? 'Mostra dettagli' : 'Nascondi dettagli';
  };

  // Carica il percorso al primo avvio
  loadNewRoute(false);
})();
</script>
</body>
</html>
