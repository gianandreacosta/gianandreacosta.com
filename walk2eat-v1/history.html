<!doctype html><html lang='it'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Cronologia</title><link rel='stylesheet' href='assets/css/styles.css'><link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'><script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script></head><body><div class='container'><div class='nav'><div class='brand'><img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' /><span class="brand-text">Walk<span class="brand-two">2</span>Eat</span></div><div class='nav-links'><a class='btn secondary' href='dashboard.html'>La tua pausa</a><a class='btn ghost' href='favorites.html'>Preferiti</a><a class='btn ghost' href='preferences.html'>Preferenze</a></div></div><div class='card'><h3>Cronologia pause</h3><div id='hist' class='list'></div></div></div><script src='assets/js/routes-poc-data.js'></script>
<script src='assets/js/app.js'></script><script>const HEART_OFF='\u2661',HEART_ON='\u2764';const hist=LBW.Store.get('lbw_history',[]);const histEl=document.getElementById('hist');const maps={};function breakdown(walk,food){const walkTotal=walk?.minutes||0;const walkOut=Math.max(6,Math.floor(walkTotal*0.55));const walkBack=Math.max(4,walkTotal-walkOut);const orderMin=(food?.mealMode==='Ho già la schiscetta')?3:8;const lunchMin=Math.max(10,food?.etaEatMin||15);const total=walkOut+orderMin+lunchMin+walkBack;return `Andata: ${walkOut} min • Ordine: ${orderMin} min • Pranzo: ${lunchMin} min • Rientro: ${walkBack} min • Totale: ${total} min`;}
function drawMap(id,proposal){const mapId=`map-${id}`;const el=document.getElementById(mapId);if(!el||!proposal?.route||proposal.route.length<2)return;let m=maps[mapId];if(!m){m=L.map(mapId,{zoomControl:false,attributionControl:false});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);maps[mapId]=m;}const pts=proposal.route.map(x=>[x.lat,x.lng]);if(m._line)m.removeLayer(m._line);if(m._start)m.removeLayer(m._start);if(m._dest)m.removeLayer(m._dest);m._line=L.polyline(pts,{color:'#22c55e',weight:4}).addTo(m);m._start=L.marker(pts[0]).addTo(m).bindPopup('Partenza');m._dest=L.marker(pts[2]||pts[pts.length-1]).addTo(m).bindPopup(proposal.food?.name||'Destinazione');m.fitBounds(L.latLngBounds(pts),{padding:[18,18]});}
if(!hist.length){histEl.innerHTML='<div class="small">Nessuna pausa registrata</div>';}else{histEl.innerHTML=hist.map((x,i)=>{const pFav=LBW.isFavoritePlace(x.food)?HEART_ON:HEART_OFF;const rFav=LBW.isFavoriteRoute(x)?HEART_ON:HEART_OFF;const foodInfo=[x.food.cuisine];if(x.food.price&&x.food.price!=='-')foodInfo.push(x.food.price);return `<div class='card'><b>${x.food.name}</b><div class='small'>${new Date(x.createdAt).toLocaleString()}</div><div class='small'>Percorso: ${x.walk.minutes} min • ${x.walk.distanceKm} km • ${x.walk.type}</div><div class='small'>Ristorante/spot: ${foodInfo.join(' • ')}</div><div style='display:flex;gap:8px;flex-wrap:wrap;margin-top:8px'><button class='btn ghost' id='favPlace${i}'>${pFav} Ristorante</button><button class='btn ghost' id='favRoute${i}'>${rFav} Percorso</button><button class='btn ghost' id='toggle${i}'>Mostra dettagli</button></div><div id='detail${i}' style='display:none;margin-top:8px'><div class='small' id='time${i}'></div><div id='map-${i}' class='map-box' style='margin-top:8px;height:200px'></div><button class='btn secondary' id='select${i}' style='margin-top:8px'>Seleziona</button></div></div>`;}).join('');setTimeout(()=>{hist.forEach((x,i)=>{const bp=document.getElementById(`favPlace${i}`),br=document.getElementById(`favRoute${i}`),tg=document.getElementById(`toggle${i}`),dt=document.getElementById(`detail${i}`),tm=document.getElementById(`time${i}`),sl=document.getElementById(`select${i}`);if(bp)bp.onclick=()=>{const on=LBW.toggleFavoritePlace(x.food);bp.textContent=`${on?HEART_ON:HEART_OFF} Ristorante`;};if(br)br.onclick=()=>{const on=LBW.toggleFavoriteRoute(x);br.textContent=`${on?HEART_ON:HEART_OFF} Percorso`;};if(tg)tg.onclick=()=>{const open=dt.style.display!=='none';dt.style.display=open?'none':'block';tg.textContent=open?'Mostra dettagli':'Nascondi dettagli';if(!open){tm.textContent=breakdown(x.walk,x.food);drawMap(i,x);}};if(sl)sl.onclick=()=>{LBW.Store.set('lbw_today',x);window.location.href='dashboard.html';};});},0);}</script></body></html>
