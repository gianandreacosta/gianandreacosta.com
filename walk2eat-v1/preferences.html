<!doctype html>
<html lang='it'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Preferenze</title>
  <link rel='stylesheet' href='assets/css/styles.css'>
  <style>
    .checkbox-wrapper-7 .tgl{display:none}.checkbox-wrapper-7 .tgl,.checkbox-wrapper-7 .tgl:after,.checkbox-wrapper-7 .tgl:before,.checkbox-wrapper-7 .tgl *,.checkbox-wrapper-7 .tgl *:after,.checkbox-wrapper-7 .tgl *:before,.checkbox-wrapper-7 .tgl + .tgl-btn{box-sizing:border-box}.checkbox-wrapper-7 .tgl + .tgl-btn{outline:0;display:block;width:4em;height:2em;position:relative;cursor:pointer;user-select:none}.checkbox-wrapper-7 .tgl + .tgl-btn:after,.checkbox-wrapper-7 .tgl + .tgl-btn:before{position:relative;display:block;content:"";width:50%;height:100%}.checkbox-wrapper-7 .tgl + .tgl-btn:after{left:0}.checkbox-wrapper-7 .tgl + .tgl-btn:before{display:none}.checkbox-wrapper-7 .tgl:checked + .tgl-btn:after{left:50%}.checkbox-wrapper-7 .tgl-ios + .tgl-btn{background:#64748b;border-radius:2em;padding:2px;transition:all .4s ease;border:1px solid #475569}.checkbox-wrapper-7 .tgl-ios + .tgl-btn:after{border-radius:2em;background:#f8fafc;transition:left .3s cubic-bezier(.175,.885,.32,1.275),padding .3s ease,margin .3s ease;box-shadow:0 0 0 1px rgba(0,0,0,.1),0 4px 0 rgba(0,0,0,.08)}.checkbox-wrapper-7 .tgl-ios + .tgl-btn:hover:after{will-change:padding}.checkbox-wrapper-7 .tgl-ios + .tgl-btn:active{box-shadow:inset 0 0 0 2em #e8eae9}.checkbox-wrapper-7 .tgl-ios + .tgl-btn:active:after{padding-right:.8em}.checkbox-wrapper-7 .tgl-ios:checked + .tgl-btn{background:#22c55e}.checkbox-wrapper-7 .tgl-ios:checked + .tgl-btn:active{box-shadow:none}.checkbox-wrapper-7 .tgl-ios:checked + .tgl-btn:active:after{margin-left:-.8em}
    .toggle-row{display:flex;align-items:center;gap:10px;padding:8px 2px 8px}
    .address-wrap { position: relative; }
    #addressSuggestions {
      position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
      background: #1f2937; border: 1px solid #334155; border-radius: 10px;
      margin-top: 4px; max-height: 200px; overflow-y: auto;
      display: none;
    }
    #addressSuggestions .suggestion-item {
      padding: 10px 14px; cursor: pointer; font-size: 0.9rem;
      border-bottom: 1px solid #334155;
    }
    #addressSuggestions .suggestion-item:last-child { border-bottom: none; }
    #addressSuggestions .suggestion-item:hover { background: rgba(34,197,94,0.1); color: #22c55e; }
    #geocodeStatus { font-size: 0.8rem; margin-top: 4px; min-height: 1.2em; }
    #geocodeStatus.ok { color: #22c55e; }
    #geocodeStatus.err { color: #f87171; }
    #geocodeStatus.loading { color: #94a3b8; }
  </style>
</head>
<body>
<div class='container'>
  <div class='nav'>
    <div class='brand'>
      <img class='brand-logo' src='assets/branding-hq/walk2eat-navbar-dark-128.png' alt='Walk2Eat logo' />
      <span class="brand-text">Walk<span class="brand-two">2</span>Eat</span>
    </div>
    <div class='nav-links'>
      <a class='btn secondary' href='dashboard.html'>La tua pausa</a>
      <a class='btn ghost' href='favorites.html'>Preferiti</a>
    </div>
  </div>

  <div class='card'>
    <h2 id='prefsTitle'>Preferenze</h2>
    <div class='form-row'>

      <div>
        <label>Pausa massima (min)</label>
        <select id='breakMinutes'><option>20</option><option>30</option><option>45</option><option>60</option><option>75</option><option>90</option></select>
      </div>

      <div>
        <label>Camminata desiderata (min)</label>
        <select id='walkMinutes'><option>10</option><option>15</option><option>20</option><option>30</option></select>
      </div>

      <div>
        <label>Tipo di cibo</label>
        <div class='toggle-row'>
          <div class='checkbox-wrapper-7'><input class='tgl tgl-ios' id='schiscettaCheck' type='checkbox' /><label class='tgl-btn' for='schiscettaCheck'></label></div>
          <span class='small' style='color:inherit'>Ho già la schiscetta</span>
        </div>
        <select id='cuisine'><option>Scegli tu</option></select>
      </div>

      <div>
        <label>Budget</label>
        <select id='budget'><option>$</option><option>$$</option><option>$$$</option></select>
      </div>

      <div>
        <label>Preferenze alimentari</label>
        <select id='diet'>
          <option value='none'>Nessuna</option>
          <option>Vegetariano</option><option>Vegano</option>
          <option>Gluten free</option><option>Intolleranza al lattosio</option>
        </select>
      </div>

      <div>
        <label>Intensità</label>
        <select id='intensity'><option>rilassata</option><option>media</option><option>dinamica</option></select>
      </div>

      <div>
        <label>Obiettivo pausa</label>
        <select id='goal'>
          <option>staccare</option><option>muoversi</option>
          <option>scoprire posti nuovi</option><option>mangiare veloce</option>
        </select>
      </div>

      <div>
        <label>Indirizzo di partenza</label>
        <div class='toggle-row'>
          <div class='checkbox-wrapper-7'><input class='tgl tgl-ios' id='gpsCheck' type='checkbox' /><label class='tgl-btn' for='gpsCheck'></label></div>
          <span class='small' style='color:inherit'>Usa posizione attuale (GPS)</span>
        </div>
        <div class='address-wrap'>
          <input id='address' class='input' placeholder='Es. Via Nassa 1, Lugano' autocomplete='off'>
          <div id='addressSuggestions'></div>
        </div>
        <div id='geocodeStatus'></div>
      </div>

    </div>

    <div style='margin-top:12px;display:flex;gap:8px;flex-wrap:wrap'>
      <button id='save' class='btn'>Salva preferenze</button>
      <button id='logoutBtn' class='btn ghost' type='button'>Logout</button>
    </div>
  </div>
</div>

<script src='assets/js/routes-poc-data.js?v=20260317h'></script>
<script src='assets/js/config.js?v=20260317h'></script>
<script src='assets/js/app.js?v=20260317h'></script>
<script>
(function() {
  var user = LBW.getUser();
  document.getElementById('prefsTitle').textContent = 'Preferenze ' + (user && user.name ? user.name : 'utente');

  var p = LBW.getPrefs();
  var breakMinutesEl = document.getElementById('breakMinutes');
  var walkMinutesEl  = document.getElementById('walkMinutes');
  var budgetEl       = document.getElementById('budget');
  var cuisineEl      = document.getElementById('cuisine');
  var dietEl         = document.getElementById('diet');
  var intensityEl    = document.getElementById('intensity');
  var goalEl         = document.getElementById('goal');
  var schiscettaCheckEl = document.getElementById('schiscettaCheck');
  var addressEl      = document.getElementById('address');
  var gpsCheckEl     = document.getElementById('gpsCheck');
  var saveEl         = document.getElementById('save');
  var suggestionsEl  = document.getElementById('addressSuggestions');
  var statusEl       = document.getElementById('geocodeStatus');

  LBW.DB.cuisines.forEach(function(c) { cuisineEl.innerHTML += '<option>' + c + '</option>'; });

  // Valori salvati
  breakMinutesEl.value = p.breakMinutes;
  walkMinutesEl.value  = p.walkMinutes;
  budgetEl.value       = p.budget;
  cuisineEl.value      = p.cuisine || 'Scegli tu';
  dietEl.value         = p.diet;
  intensityEl.value    = p.intensity;
  goalEl.value         = p.goal;
  schiscettaCheckEl.checked = (p.mealMode === 'Ho già la schiscetta');
  gpsCheckEl.checked = (p.location && p.location.label === 'Posizione attuale');

  // Coordinate correnti (aggiornate da geocoding o GPS)
  var currentPos = { lat: p.location.lat, lng: p.location.lng, label: p.location.label || '' };

  if (!gpsCheckEl.checked && p.location.label && p.location.label !== 'Posizione attuale') {
    addressEl.value = p.location.label;
    statusEl.className = 'ok';
    statusEl.textContent = '✓ ' + p.location.label + ' (' + p.location.lat.toFixed(4) + ', ' + p.location.lng.toFixed(4) + ')';
  }

  function syncAddressMode() {
    if (gpsCheckEl.checked) {
      addressEl.value = '';
      addressEl.disabled = true;
      addressEl.placeholder = 'Posizione GPS attiva';
      addressEl.style.opacity = '0.5';
      suggestionsEl.style.display = 'none';
      statusEl.textContent = '';
    } else {
      addressEl.disabled = false;
      addressEl.placeholder = 'Es. Via Nassa 1, Lugano';
      addressEl.style.opacity = '1';
    }
  }

  function syncFoodBudgetDisabled() {
    var off = schiscettaCheckEl.checked;
    [cuisineEl, budgetEl, dietEl].forEach(function(el) {
      el.disabled = off;
      el.style.opacity = off ? '0.6' : '1';
      el.style.cursor  = off ? 'not-allowed' : 'pointer';
    });
  }

  syncAddressMode();
  syncFoodBudgetDisabled();
  schiscettaCheckEl.onchange = syncFoodBudgetDisabled;

  // GPS toggle
  gpsCheckEl.onchange = function() {
    if (!gpsCheckEl.checked) { syncAddressMode(); return; }
    if (!navigator.geolocation) { alert('GPS non supportato dal browser'); gpsCheckEl.checked = false; syncAddressMode(); return; }
    statusEl.className = 'loading'; statusEl.textContent = 'Ricerca posizione…';
    navigator.geolocation.getCurrentPosition(function(pos) {
      currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude, label: 'Posizione attuale' };
      statusEl.className = 'ok'; statusEl.textContent = '✓ Posizione GPS acquisita';
      syncAddressMode();
    }, function() {
      alert('Impossibile ottenere la posizione GPS'); gpsCheckEl.checked = false; syncAddressMode();
      statusEl.textContent = '';
    }, { enableHighAccuracy: true, timeout: 8000 });
  };

  // Geocoding con ORS + autocomplete
  var geocodeTimer = null;
  var lastQuery = '';

  function showSuggestions(items) {
    if (!items || !items.length) { suggestionsEl.style.display = 'none'; return; }
    suggestionsEl.innerHTML = '';
    items.forEach(function(item) {
      var el = document.createElement('div');
      el.className = 'suggestion-item';
      el.textContent = item.label;
      el.addEventListener('mousedown', function(e) {
        e.preventDefault();
        addressEl.value = item.label;
        currentPos = { lat: item.lat, lng: item.lng, label: item.label };
        statusEl.className = 'ok';
        statusEl.textContent = '✓ ' + item.label + ' (' + item.lat.toFixed(4) + ', ' + item.lng.toFixed(4) + ')';
        suggestionsEl.style.display = 'none';
      });
      suggestionsEl.appendChild(el);
    });
    suggestionsEl.style.display = 'block';
  }

  async function geocode(query) {
    var orsKey = (window.W2E_CONFIG && window.W2E_CONFIG.orsApiKey) || '';
    var url = 'https://api.openrouteservice.org/geocode/autocomplete?api_key=' + encodeURIComponent(orsKey) +
              '&text=' + encodeURIComponent(query) + '&size=5&lang=it';
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('Geocoding error ' + resp.status);
    var data = await resp.json();
    return (data.features || []).map(function(f) {
      return {
        label: f.properties.label || f.properties.name || query,
        lat: f.geometry.coordinates[1],
        lng: f.geometry.coordinates[0]
      };
    });
  }

  addressEl.addEventListener('input', function() {
    var q = addressEl.value.trim();
    if (gpsCheckEl.checked) return;
    if (q === lastQuery || q.length < 3) { suggestionsEl.style.display = 'none'; return; }
    clearTimeout(geocodeTimer);
    statusEl.className = 'loading'; statusEl.textContent = 'Ricerca…';
    geocodeTimer = setTimeout(async function() {
      lastQuery = q;
      try {
        var results = await geocode(q);
        showSuggestions(results);
        if (results.length === 0) { statusEl.className = 'err'; statusEl.textContent = 'Nessun risultato trovato'; }
        else { statusEl.textContent = ''; }
      } catch(e) {
        statusEl.className = 'err'; statusEl.textContent = 'Errore geocoding';
        suggestionsEl.style.display = 'none';
      }
    }, 400);
  });

  addressEl.addEventListener('blur', function() {
    setTimeout(function() { suggestionsEl.style.display = 'none'; }, 150);
  });

  // Salva
  saveEl.onclick = async function() {
    var mealMode = schiscettaCheckEl.checked ? 'Ho già la schiscetta' : 'Mangio fuori';
    var locToSave;

    if (gpsCheckEl.checked) {
      locToSave = currentPos;
    } else {
      var addrVal = addressEl.value.trim();
      if (addrVal && (currentPos.label !== addrVal)) {
        // Testo modificato manualmente senza selezionare dal dropdown: geocodifica al salvataggio
        statusEl.className = 'loading'; statusEl.textContent = 'Geocoding in corso…';
        saveEl.disabled = true;
        try {
          var results = await geocode(addrVal);
          if (results.length) {
            currentPos = { lat: results[0].lat, lng: results[0].lng, label: results[0].label };
            statusEl.className = 'ok'; statusEl.textContent = '✓ ' + results[0].label;
          } else {
            statusEl.className = 'err'; statusEl.textContent = 'Indirizzo non trovato, usate le coordinate precedenti';
          }
        } catch(e) { statusEl.className = 'err'; statusEl.textContent = 'Errore geocoding'; }
        saveEl.disabled = false;
      }
      locToSave = { lat: currentPos.lat, lng: currentPos.lng, label: currentPos.label || addrVal };
    }

    LBW.setPrefs({
      breakMinutes: +breakMinutesEl.value,
      walkMinutes: +walkMinutesEl.value,
      budget: budgetEl.value,
      cuisine: cuisineEl.value,
      diet: dietEl.value,
      intensity: intensityEl.value,
      goal: goalEl.value,
      mood: p.mood || 'Oggi zero sbatti',
      mealMode: mealMode,
      location: locToSave
    });
    LBW.Store.set('lbw_today', null);
    location.href = 'dashboard.html';
  };

  document.getElementById('logoutBtn').onclick = function() {
    LBW.Store.set('lbw_user', null);
    window.location.href = 'index.html';
  };
})();
</script>
</body>
</html>
